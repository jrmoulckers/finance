# =============================================================================
# Finance App — Self-Hosted Production Deployment
# =============================================================================
#
# A single docker-compose file that runs the full Finance backend stack:
#   PostgreSQL 15, PostgREST API, GoTrue Auth, Edge Functions, Caddy reverse proxy
#
# Quick start:
#   1. cp .env.example .env    # Fill in all values
#   2. docker compose up -d    # Start the stack
#   3. Apply migrations (see README.md)
#
# Architecture:
#   Internet → Caddy (TLS) → PostgREST / GoTrue / Edge Functions → PostgreSQL
#
# Ports exposed to the host:
#   80   — HTTP  (redirects to HTTPS)
#   443  — HTTPS (automatic Let's Encrypt via Caddy)
#
# Security: PostgreSQL is NOT exposed to the host. All services connect via
# the Docker 'finance-internal' bridge network. See #1306.
#
# Issues: #268, #897, #1306, #1316
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 15 — primary data store
  # ---------------------------------------------------------------------------
  db:
    image: supabase/postgres:15.8.1.060
    restart: unless-stopped
    # No host port exposure — all services connect via Docker 'finance-internal'
    # network. Exposing PostgreSQL to the host bypasses Caddy TLS, Edge Function
    # auth, and all RLS policies. See #1306.
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      # MUST be supabase_admin — the image's migrate.sh connects as this user
      POSTGRES_USER: supabase_admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY:-3600}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./volumes/db/backups:/backups
      # Mounted into init-scripts/ where the image's migrate.sh processes them
      - ./volumes/db/webhooks.sql:/docker-entrypoint-initdb.d/init-scripts/98-webhooks.sql:ro
      - ./volumes/db/roles.sql:/docker-entrypoint-initdb.d/init-scripts/99-roles.sql:ro
      - ./volumes/db/jwt.sql:/docker-entrypoint-initdb.d/init-scripts/99-jwt.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U supabase_admin -d ${POSTGRES_DB:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    shm_size: 128mb
    command: >
      postgres
      -c listen_addresses='*'
      -c wal_level=logical
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c log_min_duration_statement=1000
      -c log_statement=ddl
    networks:
      - finance-internal

  # ---------------------------------------------------------------------------
  # PostgREST — RESTful API layer over PostgreSQL
  # ---------------------------------------------------------------------------
  rest:
    image: postgrest/postgrest:v12.2.12
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: 'false'
      PGRST_DB_MAX_ROWS: 1000
      PGRST_SERVER_PORT: 3000
      PGRST_ADMIN_SERVER_PORT: 3001
    volumes:
      - /etc/passwd:/etc/passwd:ro
    healthcheck:
      disable: true
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - finance-internal

  # ---------------------------------------------------------------------------
  # GoTrue — Supabase Auth service
  # ---------------------------------------------------------------------------
  auth:
    image: supabase/gotrue:v2.170.0
    restart: unless-stopped
    environment:
      # Core
      GOTRUE_API_HOST: '0.0.0.0'
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: https://${DOMAIN}
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${AUTH_REDIRECT_URLS:-}
      GOTRUE_DISABLE_SIGNUP: 'false'

      # Database
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}?sslmode=disable

      # JWT
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: ${JWT_EXPIRY:-3600}
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated

      # Session lifecycle
      GOTRUE_SESSION_TIMEBOX: ${SESSION_TIMEBOX:-24h}
      GOTRUE_INACTIVITY_TIMEOUT: ${SESSION_INACTIVITY_TIMEOUT:-1h}

      # Email auth
      GOTRUE_EXTERNAL_EMAIL_ENABLED: 'true'
      GOTRUE_MAILER_AUTOCONFIRM: ${MAILER_AUTOCONFIRM:-false}

      # SMTP
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL:-}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-Finance App}
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify

      # OAuth — Apple (optional)
      GOTRUE_EXTERNAL_APPLE_ENABLED: ${APPLE_AUTH_ENABLED:-false}
      GOTRUE_EXTERNAL_APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_APPLE_SECRET: ${APPLE_SECRET:-}

      # OAuth — Google (optional)
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${GOOGLE_AUTH_ENABLED:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_SECRET:-}

      # Custom access token hook (injects household_ids into JWT)
      # Disabled until the auth.custom_access_token_hook function is created via migrations
      GOTRUE_HOOK_CUSTOM_ACCESS_TOKEN_ENABLED: 'false'
      # GOTRUE_HOOK_CUSTOM_ACCESS_TOKEN_URI: pg-functions://postgres/${POSTGRES_DB:-postgres}/auth.custom_access_token_hook

      # Rate limiting
      GOTRUE_RATE_LIMIT_HEADER: X-Forwarded-For
      GOTRUE_RATE_LIMIT_EMAIL_SENT: ${AUTH_RATE_LIMIT_EMAIL:-30}
      GOTRUE_RATE_LIMIT_TOKEN_REFRESH: ${AUTH_RATE_LIMIT_REFRESH:-150}
    healthcheck:
      test:
        ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:9999/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - finance-internal

  # ---------------------------------------------------------------------------
  # PostgreSQL Meta — required by Supabase Studio & introspection
  # ---------------------------------------------------------------------------
  meta:
    image: supabase/postgres-meta:v0.84.2
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${POSTGRES_DB:-postgres}
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      # postgres-meta image has no wget/curl — use node for HTTP health check
      test:
        [
          'CMD-SHELL',
          'node -e "require(\"http\").get(\"http://localhost:8080/health\",r=>{process.exit(r.statusCode===200?0:1)}).on(\"error\",()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    networks:
      - finance-internal

  # ---------------------------------------------------------------------------
  # Edge Functions — Deno runtime for serverless functions
  # ---------------------------------------------------------------------------
  edge-functions:
    image: supabase/edge-runtime:v1.67.4
    restart: unless-stopped
    environment:
      SUPABASE_URL: http://rest:3000
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: postgres://supabase_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      AUTH_WEBHOOK_SECRET: ${AUTH_WEBHOOK_SECRET}
      WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN}
      CRON_SECRET: ${CRON_SECRET}
    volumes:
      - ${EDGE_FUNCTIONS_PATH:-../services/api/supabase/functions}:/home/deno/functions:ro
    healthcheck:
      # edge-runtime image is minimal — no curl/wget; verify process is alive
      test: ['CMD-SHELL', 'test -f /proc/1/status']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      rest:
        condition: service_started
    command: start --main-service /home/deno/functions/main
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - finance-internal
      - finance-external

  # ---------------------------------------------------------------------------
  # PowerSync — offline-first sync engine (#881)
  # ---------------------------------------------------------------------------
  # Bridges PostgreSQL changes to edge clients via logical replication.
  # Requires a replication slot and publication on the database.
  #
  # Setup (first deployment only):
  #   1. Run on the database:
  #        SELECT pg_create_logical_replication_slot('powersync', 'pgoutput');
  #        CREATE PUBLICATION powersync FOR ALL TABLES;
  #   2. Ensure MongoDB is configured as a replica set (see mongo service below).
  #   3. Sync rules are mounted from services/api/powersync/sync-rules.yaml.
  #
  # Config: v1.20.5+ requires a YAML file at /app/powersync.yaml.
  # The entrypoint generates it from env vars using the mounted template.
  #
  # Ports: 8080 (API) — internal only, routed through Caddy at /sync/*
  #
  # TODO(#1306): PowerSync currently connects as supabase_admin (superuser).
  # Create a dedicated 'powersync_replication' PostgreSQL role with only:
  #   - REPLICATION privilege (for logical replication)
  #   - SELECT on all sync-enabled tables (for initial snapshot)
  #   - USAGE on the public schema
  # Then update PS_PG_URI below to use that role instead of supabase_admin.
  # Migration: services/api/supabase/migrations/YYYYMMDDHHMMSS_powersync_role.sql
  powersync:
    image: journeyapps/powersync-service:latest
    restart: unless-stopped
    environment:
      # These env vars are used by the startup script to generate powersync.yaml
      # TODO(#1306): Replace supabase_admin with a dedicated powersync_replication
      # role once the migration is created (see comment block above).
      PS_PG_URI: postgres://supabase_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      PS_PG_SLOT: ${POWERSYNC_SLOT_NAME:-powersync}
      PS_PG_PUBLICATION: ${POWERSYNC_PUBLICATION:-powersync}
      PS_MONGO_URI: ${POWERSYNC_MONGO_URI}
      PS_JWT_SECRET: ${JWT_SECRET}
    entrypoint: /usr/bin/sh
    command:
      - -c
      - |
        node -e "
          const fs = require('fs');
          const lines = [
            'replication:',
            '  connections:',
            '    - type: postgresql',
            '      uri: ' + process.env.PS_PG_URI,
            '      sslmode: disable',  // Acceptable: traffic stays on Docker bridge network (finance-internal). For production deployments outside Docker, upgrade to sslmode: require or verify-full.
            '      slot_name: ' + process.env.PS_PG_SLOT,
            '      publication_name: ' + process.env.PS_PG_PUBLICATION,
            '',
            'storage:',
            '  type: mongodb',
            '  uri: ' + process.env.PS_MONGO_URI,
            '',
            'client_auth:',
            '  supabase_jwt_secret: ' + process.env.PS_JWT_SECRET,
            '',
            'port: 8080',
            '',
            'sync_rules:',
            '  path: /sync-rules/sync-rules.yaml'
          ].join('\n');
          fs.writeFileSync('/tmp/powersync.yaml', lines);
          console.log('Generated /tmp/powersync.yaml');
        " && exec node service/lib/entry.js start --config-path /tmp/powersync.yaml
    volumes:
      - ${POWERSYNC_SYNC_RULES_PATH:-../services/api/powersync}:/sync-rules:ro
    healthcheck:
      # PowerSync image has no curl/wget — use node for HTTP connectivity check
      test:
        [
          'CMD-SHELL',
          'node -e "require(\"http\").get(\"http://localhost:8080/\",r=>{process.exit(r.statusCode?0:1)}).on(\"error\",()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - finance-internal

  # ---------------------------------------------------------------------------
  # MongoDB — PowerSync bucket storage (#881)
  # ---------------------------------------------------------------------------
  # PowerSync requires MongoDB for its internal bucket storage.
  # This is NOT used for application data — only sync-engine state.
  # IMPORTANT: Must run as a replica set (PowerSync uses change streams).
  #
  # First deployment: After the container starts, run:
  #   docker exec deploy-mongo-1 mongosh -u <user> -p <pass> --eval \
  #     'rs.initiate({_id:"rs0",members:[{_id:0,host:"mongo:27017"}]})'
  mongo:
    image: mongo:7-jammy
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-powersync}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodata:/data/db
      - ./volumes/mongo/replica-keyfile:/etc/mongo-keyfile:ro
    # Run as replica set with keyFile auth for internal cluster communication.
    # The keyFile is copied to a writable location with correct ownership.
    command: >-
      bash -c "cp /etc/mongo-keyfile /tmp/mongo-keyfile &&
      chmod 400 /tmp/mongo-keyfile &&
      chown mongodb:mongodb /tmp/mongo-keyfile &&
      exec mongod --replSet rs0 --keyFile /tmp/mongo-keyfile --bind_ip_all"
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    networks:
      - finance-internal

  # ---------------------------------------------------------------------------
  # Caddy — reverse proxy with automatic Let's Encrypt TLS
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    environment:
      DOMAIN: ${DOMAIN}
      TLS_EMAIL: ${TLS_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${WEB_DIST_PATH:-../apps/web/dist}:/srv/web:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      # Caddy redirects HTTP→HTTPS; wget follows redirect and TLS fails for localhost.
      # Just verify the caddy binary is responsive.
      test: ['CMD-SHELL', 'caddy version']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      rest:
        condition: service_started
      auth:
        condition: service_started
      edge-functions:
        condition: service_started
      powersync:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    networks:
      - finance-internal
      - finance-external

# =============================================================================
# Volumes — persistent data
# =============================================================================
volumes:
  pgdata:
    driver: local
  mongodata:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  finance-internal:
    driver: bridge
    internal: true
  finance-external:
    driver: bridge
