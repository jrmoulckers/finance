name: Troubleshooting
description: Get help with build errors, KMP issues, environment problems, or other development blockers
labels: ['help-wanted', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        ## Troubleshooting Request

        Having trouble building, running, or developing? Describe what's going wrong and we'll help.

  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: What are you trying to do and what's going wrong?
      placeholder: Describe the problem you're encountering.
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Problem Category
      description: What type of issue are you experiencing?
      options:
        - Build failure (Gradle/npm)
        - KMP compilation error
        - IDE / language server issue
        - Dependency conflict
        - Test failure
        - Environment setup
        - CI/CD pipeline
        - Sync / backend
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error Output
      description: Paste the full error message, stack trace, or build log.
      render: shell
      placeholder: |
        Paste the error output here.
        Include the full stack trace if available.
    validations:
      required: true

  - type: textarea
    id: what-tried
    attributes:
      label: What I've Tried
      description: List any troubleshooting steps you've already attempted.
      placeholder: |
        - Ran `npm run clean && npm run build`
        - Deleted `.gradle/` and rebuilt
        - Checked JDK version with `java -version`
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide details about your development environment.
      placeholder: |
        - OS: e.g. Windows 11, macOS 15, Ubuntu 24.04
        - Node.js: (run `node --version`)
        - JDK: (run `java -version`)
        - IDE: e.g. VS Code 1.99, Android Studio 2024.3
        - Gradle: (run `node tools/gradle.js --version`)
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### Common KMP Gotchas

        Before submitting, check if your issue matches one of these known patterns:

        - **JDK version mismatch**: This project requires JDK 21. Check with `java -version`. If you have multiple JDKs, the build auto-detects via `tools/gradle.js` — ensure Temurin 21 is installed.
        - **Kotlin language server crash**: If the Kotlin extension crashes in VS Code, set `kotlin.java.home` in `.vscode/settings.json` to your JDK 21 path.
        - **`expect`/`actual` errors**: Ensure all `expect` declarations in `commonMain` have matching `actual` implementations in each target source set (`androidMain`, `iosMain`, `jvmMain`, `jsMain`).
        - **SQLDelight schema conflicts**: After modifying `.sq` files, run `node tools/gradle.js generateSqlDelightInterface` to regenerate type-safe queries.
        - **Gradle daemon issues**: If builds hang, try `node tools/gradle.js --stop` to kill stale daemons.
