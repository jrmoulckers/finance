name: Lint & Format

on:
  push:
    branches: [main]
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
      - '**/*.jsx'
      - '**/*.mjs'
      - '**/*.cjs'
      - '**/*.json'
      - '**/*.css'
      - '**/*.html'
      - '**/*.yaml'
      - '**/*.yml'
      - '.eslintrc*'
      - 'eslint.config.*'
      - '.prettierrc*'
      - '.prettierignore'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main]
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
      - '**/*.jsx'
      - '**/*.mjs'
      - '**/*.cjs'
      - '**/*.json'
      - '**/*.css'
      - '**/*.html'
      - '**/*.yaml'
      - '**/*.yml'
      - '.eslintrc*'
      - 'eslint.config.*'
      - '.prettierrc*'
      - '.prettierignore'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  eslint-prettier:
    name: ESLint & Prettier
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Persist ESLint cache across runs for faster incremental linting
      - name: Cache ESLint results
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('eslint.config.*', 'package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            eslint-${{ runner.os }}-${{ hashFiles('eslint.config.*', 'package-lock.json') }}-
            eslint-${{ runner.os }}-

      - name: ESLint
        run: npx eslint . --max-warnings 0 --cache --cache-location .eslintcache

      - name: Prettier
        run: npx prettier --check .
