# =============================================================================
# Web CI — build, test, E2E, and Lighthouse checks
# =============================================================================
#
# Runs the web build/test pipeline for pull requests and main pushes while keeping the full nightly browser matrix in the dedicated nightly workflow.
# =============================================================================
name: CI — Web

on:
  push:
    branches: [main]
    paths: ['apps/web/**', 'packages/design-tokens/**']
  pull_request:
    branches: [main]
    paths: ['apps/web/**', 'packages/design-tokens/**']

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build -w packages/design-tokens

      - name: Build web app
        id: web-build
        env:
          # Disable demo auth mode in E2E builds so the normal auth flow
          # (tryRestoreSession → refresh endpoint) runs.  E2E fixtures mock
          # these endpoints — no real Supabase connection is needed.
          VITE_SUPABASE_URL: https://e2e-test.supabase.co
          VITE_SUPABASE_ANON_KEY: e2e-test-anon-key
        run: |
          BUILD_START=$SECONDS
          npm run build -w apps/web
          echo "duration=$(( SECONDS - BUILD_START ))" >> "$GITHUB_OUTPUT"

      - name: Verify web build env
        run: node tools/verify-build-env.mjs apps/web/dist

      - name: Check source map configuration
        run: |
          if grep -r 'sourcemap\|sourceMap\|source-map' apps/web/vite.config.* 2>/dev/null | grep -v node_modules > /dev/null; then
            echo 'Source maps configured in Vite.' >> "$GITHUB_STEP_SUMMARY"
          else
            echo '::warning::No source map configuration found in apps/web/vite.config.*'
          fi

      - name: Report bundle size
        run: |
          echo "### 🌐 Web Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build duration | ${{ steps.web-build.outputs.duration || 'N/A' }}s |" >> "$GITHUB_STEP_SUMMARY"
          if [ -d "apps/web/dist" ]; then
            TOTAL=$(du -sh apps/web/dist/ | cut -f1)
            echo "| Bundle size | $TOTAL |" >> "$GITHUB_STEP_SUMMARY"
            # Report JS + CSS sizes
            JS_SIZE=$(find apps/web/dist -name '*.js' -exec du -cb {} + 2>/dev/null | tail -1 | cut -f1 || echo "0")
            CSS_SIZE=$(find apps/web/dist -name '*.css' -exec du -cb {} + 2>/dev/null | tail -1 | cut -f1 || echo "0")
            echo "| JS total | $(( JS_SIZE / 1024 ))KB |" >> "$GITHUB_STEP_SUMMARY"
            echo "| CSS total | $(( CSS_SIZE / 1024 ))KB |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-build
          path: |
            apps/web/dist/
            packages/design-tokens/build/

  unit-tests:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-build

      - run: npm test -w apps/web

  e2e-tests:
    name: E2E Tests (${{ matrix.browser }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, webkit, firefox, chromium-edge, mobile-chrome]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-build

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/web/package.json') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: |
          case "${{ matrix.browser }}" in
            chromium|mobile-chrome)
              npx -w apps/web playwright install --with-deps chromium
              ;;
            webkit|mobile-safari)
              npx -w apps/web playwright install --with-deps webkit
              ;;
            firefox)
              npx -w apps/web playwright install --with-deps firefox
              ;;
            chromium-edge)
              npx -w apps/web playwright install --with-deps msedge
              ;;
          esac

      - name: Run E2E tests (${{ matrix.browser }})
        run: |
          if [[ "${{ matrix.browser }}" == mobile-* ]]; then
            npx -w apps/web playwright test e2e/auth.spec.ts -g "login page renders" --project=${{ matrix.browser }}
          else
            npx -w apps/web playwright test --project=${{ matrix.browser }}
          fi

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-blob-report-${{ matrix.browser }}
          path: apps/web/blob-report/
          retention-days: 7
          if-no-files-found: ignore

  # Merge all browser reports into a single HTML report
  e2e-report:
    name: Merge E2E Reports
    needs: e2e-tests
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: e2e-blob-report-*
          merge-multiple: true
          path: all-blob-reports

      - name: Merge reports
        run: |
          npx -w apps/web playwright merge-reports \
            --reporter=html \
            "${{ github.workspace }}/all-blob-reports" \
            || echo "::warning::No blob reports found to merge"

      - name: Upload merged HTML report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-html-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: warn

      - name: E2E Summary
        if: always()
        run: |
          echo "### 🎭 E2E Test Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Browser matrix: chromium, webkit, firefox, chromium-edge, mobile-chrome; mobile-safari on main/nightly only. Mobile projects run a startup smoke test. CI retries flaky tests twice." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "📊 **Download the full HTML report** from the \`e2e-html-report\` artifact above." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          # Check if any browser jobs failed
          if [ "${{ needs.e2e-tests.result }}" = "failure" ]; then
            echo "⚠️ Some E2E browser jobs failed — check individual logs for details." >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ needs.e2e-tests.result }}" = "success" ]; then
            echo "✅ All E2E browser jobs passed." >> "$GITHUB_STEP_SUMMARY"
          fi

  lighthouse:
    name: Lighthouse Audit (Informational)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Lighthouse is informational — should not block PR merge
    continue-on-error: true

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-build

      - name: Lighthouse Audit
        id: lighthouse-audit
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12.6.2
        continue-on-error: true
        with:
          configPath: apps/web/lighthouserc.json
          budgetPath: apps/web/budget.json
          uploadArtifacts: true
          runs: ${{ github.event_name == 'push' && 3 || 1 }}

      - name: Lighthouse Budget Check
        if: always() && (steps.lighthouse-audit.conclusion == 'success' || steps.lighthouse-audit.conclusion == 'failure')
        run: npx @lhci/cli assert --config=apps/web/lighthouserc-budget.json
        continue-on-error: true
