# =============================================================================
# Release Candidate — Branch and Tag Workflow
# =============================================================================
#
# Creates a release candidate branch (release/v2.0.0) and RC tags (v2.0.0-rc.1)
# for staged validation before production release.
#
# Flow:
#   1. Creates release/vX.Y.Z branch from main (or specified ref)
#   2. Bumps version to X.Y.Z-rc.N
#   3. Runs smoke tests on all platforms
#   4. Tags the RC (vX.Y.Z-rc.N)
#   5. Triggers release-artifacts.yml for RC artifact builds
#
# Human approval gates:
#   - RC creation requires "staging" environment approval
#   - Promotion to final release is a separate manual step
#
# Issue: #1147
# =============================================================================

name: Release Candidate

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Target release version (e.g. 2.0.0)'
        required: true
        type: string
      rc_number:
        description: 'RC number (auto-increments if 0)'
        required: false
        type: number
        default: 0
      base_ref:
        description: 'Base ref to branch from (default: main)'
        required: false
        type: string
        default: 'main'
      skip_smoke_tests:
        description: 'Skip smoke tests (for urgent RCs only)'
        required: false
        type: boolean
        default: false

concurrency:
  group: rc-${{ github.event.inputs.version }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Gate ──────────────────────────────────────────────────────────
  approve:
    name: RC Approval Gate
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - run: echo "✅ RC creation approved for v${{ inputs.version }}"

  # ── Create RC ────────────────────────────────────────────────────
  create-rc:
    name: Create Release Candidate
    needs: approve
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      rc_version: ${{ steps.rc.outputs.rc_version }}
      rc_tag: ${{ steps.rc.outputs.rc_tag }}
      branch: ${{ steps.rc.outputs.branch }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.base_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Determine RC number
        id: rc
        run: |
          VERSION="${{ inputs.version }}"
          BRANCH="release/v${VERSION}"
          RC_INPUT=${{ inputs.rc_number }}

          if [ "$RC_INPUT" -gt 0 ] 2>/dev/null; then
            RC_NUM="$RC_INPUT"
          else
            # Auto-detect: find highest existing RC tag for this version
            EXISTING=$(git tag --list "v${VERSION}-rc.*" --sort=-version:refname | head -1)
            if [ -n "$EXISTING" ]; then
              LAST_RC=$(echo "$EXISTING" | grep -oP 'rc\.\K\d+')
              RC_NUM=$((LAST_RC + 1))
            else
              RC_NUM=1
            fi
          fi

          RC_VERSION="${VERSION}-rc.${RC_NUM}"
          RC_TAG="v${RC_VERSION}"

          echo "rc_version=${RC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "rc_tag=${RC_TAG}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

          echo "### 🏷️ Release Candidate" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${RC_VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | \`${RC_TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${BRANCH}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Base | \`${{ inputs.base_ref }}\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update release branch
        run: |
          BRANCH="${{ steps.rc.outputs.branch }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create branch if it doesn't exist, otherwise checkout
          if git rev-parse --verify "origin/${BRANCH}" >/dev/null 2>&1; then
            git checkout "${BRANCH}"
            git pull origin "${BRANCH}"
            echo "📌 Checked out existing branch ${BRANCH}"
          else
            git checkout -b "${BRANCH}"
            echo "🌿 Created new branch ${BRANCH}"
          fi

      - name: Bump version to RC
        run: |
          RC_VERSION="${{ steps.rc.outputs.rc_version }}"

          # Update root package.json
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = '${RC_VERSION}';
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          echo "📦 Version bumped to ${RC_VERSION}"

      - name: Generate RC changelog
        run: |
          RC_TAG="${{ steps.rc.outputs.rc_tag }}"
          PREV_TAG=$(git tag --sort=-version:refname --list 'v*' | head -1)

          if [ -n "$PREV_TAG" ]; then
            node tools/generate-changelog.js --from "$PREV_TAG" --to HEAD > rc-changelog.md 2>/dev/null || true
          fi

          if [ ! -s rc-changelog.md ]; then
            echo "## ${RC_TAG}" > rc-changelog.md
            echo "" >> rc-changelog.md
            echo "### Changes" >> rc-changelog.md
            if [ -n "$PREV_TAG" ]; then
              git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" >> rc-changelog.md
            else
              echo "- Release candidate" >> rc-changelog.md
            fi
          fi

      - name: Commit and push
        run: |
          RC_VERSION="${{ steps.rc.outputs.rc_version }}"
          BRANCH="${{ steps.rc.outputs.branch }}"

          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "chore(release): prepare v${RC_VERSION}

          Release candidate ${RC_VERSION} preparation.
          Branch: ${BRANCH}
          Triggered-By: @${{ github.actor }}"

          git push origin "${BRANCH}"

      - name: Create RC tag
        run: |
          RC_TAG="${{ steps.rc.outputs.rc_tag }}"
          RC_VERSION="${{ steps.rc.outputs.rc_version }}"

          if git rev-parse "$RC_TAG" >/dev/null 2>&1; then
            echo "::warning::Tag ${RC_TAG} already exists — skipping"
            exit 0
          fi

          git tag -a "$RC_TAG" -m "Release candidate ${RC_VERSION}

          Automated RC tag via Release Candidate workflow.
          Triggered by: @${{ github.actor }}"

          git push origin "$RC_TAG"

          echo "### ✅ Tag \`${RC_TAG}\` created and pushed" >> "$GITHUB_STEP_SUMMARY"

  # ── Smoke Tests ──────────────────────────────────────────────────
  smoke-tests:
    name: RC Smoke Tests
    needs: create-rc
    if: inputs.skip_smoke_tests != true
    uses: ./.github/workflows/reusable-smoke-test.yml
    with:
      version: ${{ needs.create-rc.outputs.rc_version }}
      platforms: 'android,ios,web,windows'
    secrets: inherit

  # ── Summary ──────────────────────────────────────────────────────
  rc-summary:
    name: RC Summary
    needs: [create-rc, smoke-tests]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Summary
        run: |
          RC_TAG="${{ needs.create-rc.outputs.rc_tag }}"
          BRANCH="${{ needs.create-rc.outputs.branch }}"
          SMOKE="${{ needs.smoke-tests.outputs.result || 'skipped' }}"

          echo "### 🏷️ Release Candidate Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| RC Tag | \`${RC_TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${BRANCH}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Smoke Tests | ${SMOKE} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$SMOKE" = "fail" ]; then
            echo "⚠️ **Smoke tests failed.** Review failures before promoting this RC." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Next Steps" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "1. The \`release-artifacts.yml\` workflow will build platform binaries for \`${RC_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "2. Test the RC artifacts in staging environments" >> "$GITHUB_STEP_SUMMARY"
            echo "3. When ready, use the **Release Train** workflow to promote to final release" >> "$GITHUB_STEP_SUMMARY"
            echo "4. Or create another RC with an incremented number if fixes are needed" >> "$GITHUB_STEP_SUMMARY"
          fi
