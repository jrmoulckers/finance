name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Add additional setup steps as the project evolves:
      # - Platform SDKs (Swift, Kotlin, .NET)
      # - Package managers (npm, pip, gradle, etc.)
      # - Database tools
      # - Linters and formatters
