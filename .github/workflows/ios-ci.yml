name: iOS CI

on:
  push:
    branches: [main]
    paths: ['apps/ios/**', 'packages/**']
  pull_request:
    branches: [main]
    paths: ['apps/ios/**', 'packages/**']

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  build:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 60
    env:
      GRADLE_OPTS: >-
        -Xmx2g
        -XX:MaxMetaspaceSize=512m
        -Dorg.gradle.daemon=false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
      - name: Build FinanceSync XCFramework
        run: ./gradlew :packages:sync:assembleFinanceSyncXCFramework --no-daemon

      - name: List available schemes
        run: |
          cd apps/ios
          xcodebuild -list 2>&1

      - name: Build & Test
        run: |
          cd apps/ios
          mkdir -p .build
          set -o pipefail
          xcodebuild test \
            -scheme FinanceCI \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -enableCodeCoverage YES \
            -resultBundlePath .build/TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee .build/xcodebuild.log

      - name: Generate coverage report
        if: always()
        continue-on-error: true
        run: |
          cd apps/ios
          if [ -d ".build/TestResults.xcresult" ]; then
            echo "### Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
            xcrun xccov view --report .build/TestResults.xcresult >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          else
            echo "Test results not found, skipping coverage report"
          fi

      - name: Upload test results
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ios-test-results
          path: apps/ios/.build/TestResults.xcresult
          if-no-files-found: warn
          retention-days: 14
