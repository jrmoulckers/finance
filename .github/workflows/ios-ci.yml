name: iOS CI

on:
  push:
    branches: [main]
    paths: ['apps/ios/**', 'packages/**']
  pull_request:
    branches: [main]
    paths: ['apps/ios/**', 'packages/**']

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  build:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable

      - name: Cache SPM dependencies
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            apps/ios/.build
            ~/Library/Developer/Xcode/DerivedData
            ~/.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('apps/ios/Package.resolved', 'apps/ios/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        run: |
          cd apps/ios
          xcodebuild build \
            -scheme FinanceApp \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -20

      - name: Test
        run: |
          cd apps/ios
          xcodebuild test \
            -scheme FinanceApp \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath .build/TestResults.xcresult \
            2>&1 | tail -30

      - name: Generate coverage report
        if: always()
        continue-on-error: true
        run: |
          cd apps/ios
          XCRESULT=".build/TestResults.xcresult"
          if [ -d "$XCRESULT" ]; then
            xcrun xcresulttool get test-results summary \
              --path "$XCRESULT" --compact >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
            xcrun llvm-cov export -format=lcov \
              -instr-profile "$(find "$XCRESULT" -name '*.profdata' -type f 2>/dev/null | head -1)" \
              "$(find "$XCRESULT" -name '*.xctest' -type d 2>/dev/null | head -1)/Contents/MacOS/"* \
              > .build/coverage.lcov 2>/dev/null || echo "Coverage extraction skipped"
          else
            echo "No xcresult bundle found, skipping coverage"
          fi

      - name: Upload coverage report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ios-coverage
          path: apps/ios/.build/coverage.lcov
          if-no-files-found: warn
          retention-days: 14

      - name: Upload test results
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ios-test-results
          path: apps/ios/.build/TestResults.xcresult
          if-no-files-found: warn
          retention-days: 14
