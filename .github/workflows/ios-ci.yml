name: iOS CI

on:
  push:
    branches: [main]
    paths: ['apps/ios/**', 'packages/**']
  pull_request:
    branches: [main]
    paths: ['apps/ios/**', 'packages/**']

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable

      - name: Cache SPM packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('apps/ios/Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build
        run: |
          xcodebuild build \
            -scheme Finance \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -packageCachePath ~/Library/Caches/org.swift.swiftpm \
            -clonedSourcePackagesDirPath apps/ios/.spm \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}
        working-directory: apps/ios

      - name: Test
        run: |
          xcodebuild test \
            -scheme Finance \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            -packageCachePath ~/Library/Caches/org.swift.swiftpm \
            -clonedSourcePackagesDirPath apps/ios/.spm \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}
        working-directory: apps/ios

      - name: Extract code coverage
        if: always()
        run: |
          if [ -d "apps/ios/TestResults.xcresult" ]; then
            xcrun xccov view --report apps/ios/TestResults.xcresult > coverage-report.txt
            echo "## Code Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
            head -20 coverage-report.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No test results bundle found — skipping coverage extraction"
          fi

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ios-test-results
          path: apps/ios/TestResults.xcresult
          retention-days: 14
          if-no-files-found: warn
