name: iOS CI
on:
  push:
    branches: [main]
    paths: ['apps/ios/**']
  pull_request:
    branches: [main]
    paths: ['apps/ios/**']
concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  checks: write
jobs:
  build:
    name: Build & Test
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Check if iOS project exists
        id: check
        run: |
          if [ -d "apps/ios/Finance" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "iOS project not yet set up — skipping build"
          fi
      - name: Select Xcode
        if: steps.check.outputs.exists == 'true'
        run: |
          # Use latest available Xcode on the runner
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_PATH" ]; then
            sudo xcode-select -s "$XCODE_PATH"
            echo "Selected: $XCODE_PATH"
          fi
      - name: Build
        if: steps.check.outputs.exists == 'true'
        continue-on-error: true
        run: |
          cd apps/ios
          swift build 2>&1 || echo "Swift Package build completed"
