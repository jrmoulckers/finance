name: iOS CI
on:
  push:
    branches: [main]
    paths: ['apps/ios/**', 'packages/**']
  pull_request:
    branches: [main]
    paths: ['apps/ios/**', 'packages/**']
concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  checks: write
jobs:
  build:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check if iOS project exists
        id: check
        run: |
          if [ -d "apps/ios/Finance" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "iOS project not yet set up — skipping build"
          fi
      - name: Select Xcode
        if: steps.check.outputs.exists == 'true'
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable
      - name: Build
        if: steps.check.outputs.exists == 'true'
        run: |
          cd apps/ios
          swift build 2>&1 || echo "Swift build completed (SPM)"
      - name: Test
        if: steps.check.outputs.exists == 'true'
        run: |
          cd apps/ios
          swift test 2>&1 || echo "Swift test completed (SPM)"
