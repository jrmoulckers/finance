# =============================================================================
# Staging Deployment — Auto-deploy on merge to main
# =============================================================================
#
# Deploys the latest main branch to the staging environment:
#   - Web: Deploy to Vercel preview / staging URL
#   - Backend: Update Docker Compose services on staging server
#
# This workflow creates GitHub Deployment records for tracking.
#
# Issue: #886
# =============================================================================

name: Deploy — Staging

on:
  push:
    branches: [main]
    # Only deploy when app or service code changes (not docs/config only)
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'services/**'
      - 'deploy/**'

  # Allow manual re-deploy
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

env:
  ENVIRONMENT: staging

jobs:
  # ---------------------------------------------------------------------------
  # Gate: Run critical checks before deploying
  # ---------------------------------------------------------------------------
  pre-deploy-checks:
    name: Pre-deploy Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      web_changed: ${{ steps.changes.outputs.web }}
      backend_changed: ${{ steps.changes.outputs.backend }}
      sha_short: ${{ steps.meta.outputs.sha_short }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/design-tokens/**'
            backend:
              - 'services/**'
              - 'deploy/**'

      - name: Extract metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Web: Deploy to Vercel staging
  # ---------------------------------------------------------------------------
  deploy-web:
    name: Deploy Web (Staging)
    needs: pre-deploy-checks
    if: needs.pre-deploy-checks.outputs.web_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build design tokens
        run: npm run build -w packages/design-tokens

      - name: Build web (staging)
        env:
          NODE_ENV: production
          VITE_APP_VERSION: ${{ needs.pre-deploy-checks.outputs.sha_short }}
          VITE_ENVIRONMENT: staging
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_POWERSYNC_URL: ${{ secrets.POWERSYNC_URL }}
        run: npm run build -w apps/web

      - name: Deploy to Vercel (staging)
        id: deploy
        if: ${{ env.VERCEL_TOKEN != '' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # Fail loudly on errors and propagate exit codes through pipes so we
          # don't swallow Vercel failures into the output URL.
          set -euo pipefail

          # Install Vercel CLI
          npm i -g vercel@latest

          # Deploy to staging (preview environment). Use a tempfile for output
          # so we can inspect failures, but still rely on the command's exit
          # code rather than capturing stderr into DEPLOY_URL.
          DEPLOY_LOG=$(mktemp)
          if ! vercel deploy \
            --token="$VERCEL_TOKEN" \
            --scope="$VERCEL_ORG_ID" \
            --yes \
            --archive=tgz \
            apps/web/dist >"$DEPLOY_LOG" 2>&1; then
            echo "::error::Vercel deploy failed:"
            cat "$DEPLOY_LOG"
            exit 1
          fi

          DEPLOY_URL=$(tail -1 "$DEPLOY_LOG")
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "### 🌐 Web Staging (Vercel) Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL:** $DEPLOY_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ needs.pre-deploy-checks.outputs.sha_short }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Skip notice — Vercel not configured
        if: ${{ env.VERCEL_TOKEN == '' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "::warning::VERCEL_TOKEN not set — skipping Vercel deploy. Web is served from the Azure VM via deploy-web-vm."
          echo "### ⚠️ Vercel Staging Skipped" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Web (VM): Build apps/web/dist on the staging VM and let Caddy serve it
  # ---------------------------------------------------------------------------
  #
  # The Azure VM runs Caddy with a bind mount of `apps/web/dist` → /srv/web
  # (see deploy/docker-compose.yml). For Caddy to serve fresh bits, the VM
  # filesystem path must be rebuilt — `git pull` alone does NOT do that.
  # This job SSHes in and runs `npm ci && npm run build -w apps/web` so the
  # bind-mounted directory is updated. No container restart needed.
  deploy-web-vm:
    name: Deploy Web (Azure VM)
    # Serialized after deploy-backend to avoid a race on the VM's shared
    # `~/finance/.git` directory — both jobs run `git pull origin main` and
    # without serialization the second loser hits:
    #   error: cannot lock ref 'refs/remotes/origin/main'
    needs: [pre-deploy-checks, deploy-backend]
    if: |
      always() &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') &&
      (needs.pre-deploy-checks.outputs.web_changed == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: staging

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Rebuild apps/web/dist on staging VM
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '~/finance' }}
          SHA_SHORT: ${{ needs.pre-deploy-checks.outputs.sha_short }}
        run: |
          set -euo pipefail

          if [ -z "$DEPLOY_HOST" ]; then
            echo "::warning::DEPLOY_HOST not configured — skipping web VM rebuild"
            echo "### ⚠️ Web Azure VM Skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "Configure DEPLOY_HOST, DEPLOY_SSH_KEY, and DEPLOY_USER secrets." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Set up SSH key
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # SSH in and rebuild. Each line is a separate command so an early
          # failure aborts the build (set -e inside the heredoc). Use
          # `git fetch --force --prune` then `reset --hard` so we recover
          # from any stale refs (e.g. if a prior backend deploy already
          # advanced origin/main before this fetch read its expected value).
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" bash <<'DEPLOY'
            set -euo pipefail
            cd ~/finance
            echo "→ git fetch --force --prune origin main"
            git fetch --force --prune origin main
            echo "→ git reset --hard origin/main"
            git reset --hard origin/main
            echo "→ npm ci (this can take a few minutes on first run)"
            npm ci --no-audit --no-fund --silent
            echo "→ build design tokens"
            npm run build -w packages/design-tokens --silent
            echo "→ build apps/web"
            npm run build -w apps/web --silent
            echo "→ verify dist"
            test -f apps/web/dist/index.html
            ls -la apps/web/dist | head -10
          DEPLOY

          echo "### 🌐 Web Azure VM Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Host:** \`$DEPLOY_HOST\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Path:** \`$DEPLOY_PATH/apps/web/dist\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`$SHA_SHORT\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Served at:** https://finance.jrmoulckers.com" >> "$GITHUB_STEP_SUMMARY"

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  # ---------------------------------------------------------------------------
  # Backend: Deploy Docker Compose services to staging
  # ---------------------------------------------------------------------------
  deploy-backend:
    name: Deploy Backend (Staging)
    needs: pre-deploy-checks
    if: needs.pre-deploy-checks.outputs.backend_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: staging

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Staging backend deployment is SSH-based to the staging server.
      # Secrets are scoped to the "staging" GitHub Environment.
      - name: Deploy to staging server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '~/finance' }}
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "::warning::DEPLOY_HOST not configured — skipping backend deployment"
            echo "### ⚠️ Backend Staging Skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "Configure DEPLOY_HOST, DEPLOY_SSH_KEY, and DEPLOY_USER secrets." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Set up SSH key
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Deploy via SSH: pull latest, rebuild containers
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" << DEPLOY
            cd $DEPLOY_PATH
            git pull origin main
            docker compose -f deploy/docker-compose.yml pull
            docker compose -f deploy/docker-compose.yml up -d --remove-orphans
            docker compose -f deploy/docker-compose.yml ps
          DEPLOY

          echo "### 🐳 Backend Staging Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Host:** \`$DEPLOY_HOST\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ needs.pre-deploy-checks.outputs.sha_short }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  # ---------------------------------------------------------------------------
  # Notify: Post deployment summary
  # ---------------------------------------------------------------------------
  notify:
    name: Deployment Summary
    needs: [pre-deploy-checks, deploy-web, deploy-web-vm, deploy-backend]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Summary
        run: |
          echo "### 📋 Staging Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Web (Vercel) | ${{ needs.deploy-web.result || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Web (Azure VM) | ${{ needs.deploy-web-vm.result || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend | ${{ needs.deploy-backend.result || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ needs.pre-deploy-checks.outputs.sha_short }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Trigger:** ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
