# =============================================================================
# Canary Deployment Pipeline — Staged rollouts with auto-promote/rollback
# =============================================================================
#
# Deploys to canary (5% traffic), monitors error rates, and either
# auto-promotes to full production or rolls back automatically.
#
# Stages:
#   1. Deploy to canary environment (5% traffic)
#   2. Monitor error rates for configured observation window
#   3. Auto-promote to 100% if healthy, or rollback if error threshold exceeded
#
# Requires: CANARY_HOST, CANARY_SSH_KEY, CANARY_USER, DATADOG_API_KEY secrets
#
# Sprint: 10
# =============================================================================

name: Canary Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (tag like v1.0.0, or commit SHA)'
        required: true
        type: string
      component:
        description: 'Component to canary deploy'
        required: true
        type: choice
        options:
          - web
          - backend
          - all
      canary_percentage:
        description: 'Initial canary traffic percentage'
        required: false
        type: number
        default: 5
      observation_minutes:
        description: 'Minutes to observe canary before promotion decision'
        required: false
        type: number
        default: 15
      error_threshold:
        description: 'Error rate threshold (%) to trigger rollback'
        required: false
        type: number
        default: 5
      skip_monitoring:
        description: 'Skip health monitoring (promote immediately after deploy)'
        required: false
        type: boolean
        default: false

concurrency:
  group: canary-deploy
  cancel-in-progress: false # Never cancel in-flight canary deployments

permissions:
  contents: read
  deployments: write

env:
  ENVIRONMENT: canary

jobs:
  # ---------------------------------------------------------------------------
  # Prepare: Resolve version, validate inputs
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare Canary Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
      sha_short: ${{ steps.resolve.outputs.sha_short }}
      version: ${{ steps.resolve.outputs.version }}
      deploy_web: ${{ steps.components.outputs.web }}
      deploy_backend: ${{ steps.components.outputs.backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Resolve version
        id: resolve
        run: |
          VERSION="${{ github.event.inputs.version }}"
          SHA=$(git rev-parse "$VERSION" 2>/dev/null || echo "")
          if [ -z "$SHA" ]; then
            echo "::error::Could not resolve '$VERSION' to a commit"
            exit 1
          fi
          SHA_SHORT=$(echo "$SHA" | cut -c1-7)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Determine components
        id: components
        run: |
          COMPONENT="${{ github.event.inputs.component }}"
          echo "web=$( [ "$COMPONENT" = "all" ] || [ "$COMPONENT" = "web" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "backend=$( [ "$COMPONENT" = "all" ] || [ "$COMPONENT" = "backend" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Deployment plan summary
        run: |
          echo "### 🐤 Canary Deployment Plan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ github.event.inputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | ${{ github.event.inputs.component }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Canary % | ${{ github.event.inputs.canary_percentage }}% |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Observation | ${{ github.event.inputs.observation_minutes }} min |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Error threshold | ${{ github.event.inputs.error_threshold }}% |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | @${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Deploy Canary: Push to canary environment with traffic split
  # ---------------------------------------------------------------------------
  deploy-canary:
    name: Deploy Canary (${{ github.event.inputs.canary_percentage }}% traffic)
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: canary
    outputs:
      canary_url: ${{ steps.deploy.outputs.canary_url }}
      deployed_at: ${{ steps.deploy.outputs.deployed_at }}
    steps:
      - name: Checkout at deploy version
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Set up Node.js
        if: needs.prepare.outputs.deploy_web == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: needs.prepare.outputs.deploy_web == 'true'
        run: npm ci

      - name: Build web (canary)
        if: needs.prepare.outputs.deploy_web == 'true'
        env:
          NODE_ENV: production
          VITE_APP_VERSION: ${{ needs.prepare.outputs.version }}-canary
          VITE_ENVIRONMENT: canary
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_POWERSYNC_URL: ${{ secrets.POWERSYNC_URL }}
        run: |
          npm run build -w packages/design-tokens
          npm run build -w apps/web

      - name: Deploy canary
        id: deploy
        env:
          CANARY_HOST: ${{ secrets.CANARY_HOST }}
          CANARY_SSH_KEY: ${{ secrets.CANARY_SSH_KEY }}
          CANARY_USER: ${{ secrets.CANARY_USER }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          CANARY_PERCENTAGE: ${{ github.event.inputs.canary_percentage }}
        run: |
          DEPLOYED_AT=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          echo "deployed_at=$DEPLOYED_AT" >> "$GITHUB_OUTPUT"

          # --- Web canary via Vercel ---
          if [ "${{ needs.prepare.outputs.deploy_web }}" = "true" ]; then
            if [ -n "$VERCEL_TOKEN" ]; then
              npm i -g vercel@latest
              set -o pipefail
              CANARY_LOG=$(mktemp)
              if ! vercel deploy \
                --token="$VERCEL_TOKEN" \
                --scope="$VERCEL_ORG_ID" \
                --yes \
                --archive=tgz \
                --meta canary=true \
                --meta traffic_pct="$CANARY_PERCENTAGE" \
                apps/web/dist >"$CANARY_LOG" 2>&1; then
                echo "::error::Vercel canary deploy failed:"
                cat "$CANARY_LOG"
                exit 1
              fi
              CANARY_URL=$(tail -1 "$CANARY_LOG")
              echo "canary_url=$CANARY_URL" >> "$GITHUB_OUTPUT"
              echo "### 🌐 Web Canary Deployed" >> "$GITHUB_STEP_SUMMARY"
              echo "**URL:** $CANARY_URL" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "::warning::VERCEL_TOKEN not configured — skipping web canary"
              echo "canary_url=https://canary.example.com" >> "$GITHUB_OUTPUT"
            fi
          fi

          # --- Backend canary via SSH ---
          if [ "${{ needs.prepare.outputs.deploy_backend }}" = "true" ]; then
            if [ -n "$CANARY_HOST" ]; then
              mkdir -p ~/.ssh
              echo "$CANARY_SSH_KEY" > ~/.ssh/deploy_key
              chmod 600 ~/.ssh/deploy_key
              ssh-keyscan -H "$CANARY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

              ssh -i ~/.ssh/deploy_key "$CANARY_USER@$CANARY_HOST" << DEPLOY
                cd /opt/finance-canary
                git fetch origin
                git checkout ${{ needs.prepare.outputs.sha }}
                docker compose -f deploy/docker-compose.yml pull
                docker compose -f deploy/docker-compose.yml up -d --remove-orphans
                echo "Canary deployed: ${{ needs.prepare.outputs.version }}"
          DEPLOY

              rm -f ~/.ssh/deploy_key
              echo "### 🐳 Backend Canary Deployed" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "::warning::CANARY_HOST not configured — skipping backend canary"
            fi
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Traffic split:** $CANARY_PERCENTAGE% canary, $((100 - CANARY_PERCENTAGE))% stable" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Monitor: Observe error rates and health metrics
  # ---------------------------------------------------------------------------
  monitor-canary:
    name: Monitor Canary Health
    needs: [prepare, deploy-canary]
    if: github.event.inputs.skip_monitoring != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      health_status: ${{ steps.monitor.outputs.health_status }}
      error_rate: ${{ steps.monitor.outputs.error_rate }}
      p99_latency: ${{ steps.monitor.outputs.p99_latency }}
      recommendation: ${{ steps.monitor.outputs.recommendation }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Monitor canary health
        id: monitor
        env:
          CANARY_URL: ${{ needs.deploy-canary.outputs.canary_url }}
          OBSERVATION_MINUTES: ${{ github.event.inputs.observation_minutes }}
          ERROR_THRESHOLD: ${{ github.event.inputs.error_threshold }}
          DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
          DATADOG_APP_KEY: ${{ secrets.DATADOG_APP_KEY }}
        run: |
          OBSERVATION_MINUTES="${OBSERVATION_MINUTES:-15}"
          ERROR_THRESHOLD="${ERROR_THRESHOLD:-5}"
          CANARY_URL="${CANARY_URL:-https://canary.example.com}"

          echo "### 📊 Canary Health Monitoring" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Observing canary for ${OBSERVATION_MINUTES} minutes..." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          TOTAL_CHECKS=0
          FAILED_CHECKS=0
          LATENCY_SUM=0
          CHECK_INTERVAL=30 # seconds between health checks
          NUM_CHECKS=$(( (OBSERVATION_MINUTES * 60) / CHECK_INTERVAL ))

          if [ "$NUM_CHECKS" -lt 1 ]; then
            NUM_CHECKS=1
          fi

          echo "| Check # | Time | Status | Latency | HTTP Code |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|------|--------|---------|-----------|" >> "$GITHUB_STEP_SUMMARY"

          for i in $(seq 1 "$NUM_CHECKS"); do
            TOTAL_CHECKS=$((TOTAL_CHECKS + 1))
            CHECK_TIME=$(date -u '+%H:%M:%S')

            # Health check with timeout
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
              --max-time 10 \
              --connect-timeout 5 \
              "${CANARY_URL}/api/health" 2>/dev/null || echo "000")

            LATENCY=$(curl -s -o /dev/null -w '%{time_total}' \
              --max-time 10 \
              --connect-timeout 5 \
              "${CANARY_URL}/api/health" 2>/dev/null || echo "0")

            LATENCY_MS=$(echo "$LATENCY * 1000" | bc 2>/dev/null || echo "0")
            LATENCY_SUM=$(echo "$LATENCY_SUM + $LATENCY_MS" | bc 2>/dev/null || echo "0")

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ] 2>/dev/null; then
              STATUS="✅ Healthy"
            else
              STATUS="❌ Unhealthy"
              FAILED_CHECKS=$((FAILED_CHECKS + 1))
            fi

            echo "| $i/$NUM_CHECKS | $CHECK_TIME | $STATUS | ${LATENCY_MS}ms | $HTTP_CODE |" >> "$GITHUB_STEP_SUMMARY"

            # Early exit if error rate exceeds threshold by a wide margin
            if [ "$TOTAL_CHECKS" -ge 5 ]; then
              CURRENT_ERROR_RATE=$(echo "scale=2; $FAILED_CHECKS * 100 / $TOTAL_CHECKS" | bc 2>/dev/null || echo "0")
              DOUBLE_THRESHOLD=$(echo "$ERROR_THRESHOLD * 2" | bc 2>/dev/null || echo "10")
              if [ "$(echo "$CURRENT_ERROR_RATE > $DOUBLE_THRESHOLD" | bc 2>/dev/null)" = "1" ] 2>/dev/null; then
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo "⚠️ **Early exit:** Error rate ${CURRENT_ERROR_RATE}% exceeds 2x threshold" >> "$GITHUB_STEP_SUMMARY"
                break
              fi
            fi

            # Sleep between checks (skip last iteration)
            if [ "$i" -lt "$NUM_CHECKS" ]; then
              sleep "$CHECK_INTERVAL"
            fi
          done

          # Calculate final metrics
          if [ "$TOTAL_CHECKS" -gt 0 ]; then
            ERROR_RATE=$(echo "scale=2; $FAILED_CHECKS * 100 / $TOTAL_CHECKS" | bc 2>/dev/null || echo "0")
            AVG_LATENCY=$(echo "scale=0; $LATENCY_SUM / $TOTAL_CHECKS" | bc 2>/dev/null || echo "0")
          else
            ERROR_RATE="0"
            AVG_LATENCY="0"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total checks | $TOTAL_CHECKS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Failed checks | $FAILED_CHECKS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Error rate | ${ERROR_RATE}% |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Avg latency | ${AVG_LATENCY}ms |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Error threshold | ${ERROR_THRESHOLD}% |" >> "$GITHUB_STEP_SUMMARY"

          # Determine recommendation
          IS_OVER_THRESHOLD=$(echo "$ERROR_RATE > $ERROR_THRESHOLD" | bc 2>/dev/null || echo "0")
          if [ "$IS_OVER_THRESHOLD" = "1" ] || [ "$FAILED_CHECKS" -gt 0 ] && [ "$TOTAL_CHECKS" -lt 3 ]; then
            RECOMMENDATION="rollback"
            HEALTH_STATUS="unhealthy"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "🔴 **Recommendation: ROLLBACK** — Error rate ${ERROR_RATE}% exceeds threshold ${ERROR_THRESHOLD}%" >> "$GITHUB_STEP_SUMMARY"
          else
            RECOMMENDATION="promote"
            HEALTH_STATUS="healthy"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "🟢 **Recommendation: PROMOTE** — Error rate ${ERROR_RATE}% is within threshold ${ERROR_THRESHOLD}%" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "health_status=$HEALTH_STATUS" >> "$GITHUB_OUTPUT"
          echo "error_rate=$ERROR_RATE" >> "$GITHUB_OUTPUT"
          echo "p99_latency=${AVG_LATENCY}" >> "$GITHUB_OUTPUT"
          echo "recommendation=$RECOMMENDATION" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Promote: Push canary to full production
  # ---------------------------------------------------------------------------
  promote:
    name: Promote to Production (100%)
    needs: [prepare, deploy-canary, monitor-canary]
    if: always() && (needs.monitor-canary.outputs.recommendation == 'promote' || github.event.inputs.skip_monitoring == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production

    steps:
      - name: Checkout at deploy version
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Set up Node.js
        if: needs.prepare.outputs.deploy_web == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: needs.prepare.outputs.deploy_web == 'true'
        run: npm ci

      - name: Promote web to production
        if: needs.prepare.outputs.deploy_web == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN not configured — skipping web promotion"
            exit 0
          fi

          npm run build -w packages/design-tokens
          npm run build -w apps/web

          npm i -g vercel@latest
          set -o pipefail
          DEPLOY_LOG=$(mktemp)
          if ! vercel deploy \
            --token="$VERCEL_TOKEN" \
            --scope="$VERCEL_ORG_ID" \
            --prod \
            --yes \
            --archive=tgz \
            apps/web/dist >"$DEPLOY_LOG" 2>&1; then
            echo "::error::Vercel promotion to production failed:"
            cat "$DEPLOY_LOG"
            exit 1
          fi
          DEPLOY_URL=$(tail -1 "$DEPLOY_LOG")

          echo "### 🌐 Web Promoted to Production" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL:** $DEPLOY_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Promote backend to production
        if: needs.prepare.outputs.deploy_backend == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '~/finance' }}
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "::warning::DEPLOY_HOST not configured — skipping backend promotion"
            exit 0
          fi

          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" << DEPLOY
            cd $DEPLOY_PATH
            git fetch origin
            git checkout ${{ needs.prepare.outputs.sha }}
            docker compose -f deploy/docker-compose.yml pull
            docker compose -f deploy/docker-compose.yml up -d --remove-orphans
            echo "Promoted canary to production: ${{ needs.prepare.outputs.version }}"
          DEPLOY

          rm -f ~/.ssh/deploy_key
          echo "### 🐳 Backend Promoted to Production" >> "$GITHUB_STEP_SUMMARY"

      - name: Promotion summary
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### ✅ Canary Promoted Successfully" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Detail | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ needs.prepare.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Error rate | ${{ needs.monitor-canary.outputs.error_rate || 'N/A' }}% |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Traffic | 100% (promoted from ${{ github.event.inputs.canary_percentage }}%) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Promoted by | @${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Rollback: Revert canary deployment
  # ---------------------------------------------------------------------------
  rollback:
    name: Rollback Canary
    needs: [prepare, deploy-canary, monitor-canary]
    if: always() && needs.monitor-canary.outputs.recommendation == 'rollback'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Rollback canary traffic
        env:
          CANARY_HOST: ${{ secrets.CANARY_HOST }}
          CANARY_SSH_KEY: ${{ secrets.CANARY_SSH_KEY }}
          CANARY_USER: ${{ secrets.CANARY_USER }}
        run: |
          echo "### 🔴 Canary Rollback Initiated" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Detail | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ needs.prepare.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Error rate | ${{ needs.monitor-canary.outputs.error_rate }}% |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Threshold | ${{ github.event.inputs.error_threshold }}% |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Health | ${{ needs.monitor-canary.outputs.health_status }} |" >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$CANARY_HOST" ]; then
            mkdir -p ~/.ssh
            echo "$CANARY_SSH_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            ssh-keyscan -H "$CANARY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

            ssh -i ~/.ssh/deploy_key "$CANARY_USER@$CANARY_HOST" << 'ROLLBACK'
              cd /opt/finance-canary
              # Stop canary containers and remove traffic split
              docker compose -f deploy/docker-compose.yml down
              echo "Canary rolled back — all traffic routed to stable"
          ROLLBACK

            rm -f ~/.ssh/deploy_key
          else
            echo "::warning::CANARY_HOST not configured — manual rollback required"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "⚠️ **Action required:** Verify stable deployment is handling all traffic" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Summary: Final deployment record
  # ---------------------------------------------------------------------------
  summary:
    name: Deployment Record
    needs: [prepare, deploy-canary, monitor-canary, promote, rollback]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Audit trail
        run: |
          echo "### 📋 Canary Deployment Record" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ needs.prepare.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ needs.prepare.outputs.sha_short }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Canary deploy | ${{ needs.deploy-canary.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Health check | ${{ needs.monitor-canary.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Promotion | ${{ needs.promote.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Rollback | ${{ needs.rollback.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Final outcome | ${{ needs.promote.result == 'success' && '✅ Promoted' || needs.rollback.result == 'success' && '🔴 Rolled back' || '⚪ Unknown' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deployed by | @${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Timestamp | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> "$GITHUB_STEP_SUMMARY"
