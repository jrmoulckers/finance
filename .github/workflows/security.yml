name: Security Scanning
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6 AM UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql-java-kotlin:
    name: CodeQL Analysis (java-kotlin)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run on pushes to main, schedule, or PRs that touch JVM/Android/Kotlin files
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: changes
        if: github.event_name == 'pull_request'
        with:
          filters: |
            kotlin:
              - '**/*.kt'
              - '**/*.kts'
              - '**/*.java'
              - '**/build.gradle*'
              - 'gradle/**'
              - 'settings.gradle*'
      - if: github.event_name != 'pull_request' || steps.changes.outputs.kotlin == 'true'
        uses: github/codeql-action/init@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          languages: java-kotlin
          queries: +security-and-quality
      - if: github.event_name != 'pull_request' || steps.changes.outputs.kotlin == 'true'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'
      - if: github.event_name != 'pull_request' || steps.changes.outputs.kotlin == 'true'
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
      - if: github.event_name != 'pull_request' || steps.changes.outputs.kotlin == 'true'
        run: ./gradlew build -x test -x jsBrowserTest -x allTests --no-daemon
      - if: github.event_name != 'pull_request' || steps.changes.outputs.kotlin == 'true'
        uses: github/codeql-action/analyze@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          category: '/language:java-kotlin'

  codeql-javascript:
    name: CodeQL Analysis (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: github/codeql-action/init@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          languages: javascript-typescript
          queries: +security-and-quality
      - uses: github/codeql-action/analyze@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          category: '/language:javascript-typescript'

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    # Requires Dependency Graph enabled in repo settings (GitHub Advanced Security)
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  secret-scanning:
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@6c05c4a00b91aa542267d8e32a8254774799d68d # v3.93.8
        with:
          extra_args: --only-verified
