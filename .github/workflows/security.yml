name: Security Scanning
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6 AM UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql-java-kotlin:
    name: CodeQL Analysis (java-kotlin)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run on pushes to main, schedule, or PRs that touch JVM/Android/Kotlin files
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changes
        if: github.event_name == 'pull_request'
        with:
          filters: |
            kotlin:
              - '**/*.kt'
              - '**/*.kts'
              - '**/*.java'
              - '**/build.gradle*'
              - 'gradle/**'
              - 'settings.gradle*'
      - if: github.event_name != 'pull_request' || steps.changes.outputs.kotlin == 'true'
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          languages: java-kotlin
          queries: +security-and-quality
      - if: github.event_name != 'pull_request' || steps.changes.outputs.kotlin == 'true'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'
      - if: github.event_name != 'pull_request' || steps.changes.outputs.kotlin == 'true'
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1
      - if: github.event_name != 'pull_request' || steps.changes.outputs.kotlin == 'true'
        run: ./gradlew build -x test -x jsBrowserTest -x allTests --no-daemon
      - if: github.event_name != 'pull_request' || steps.changes.outputs.kotlin == 'true'
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        continue-on-error: true
        with:
          category: '/language:java-kotlin'

  codeql-javascript:
    name: CodeQL Analysis (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          languages: javascript-typescript
          queries: +security-and-quality
      - uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          category: '/language:javascript-typescript'

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    # Requires Dependency Graph enabled in repo settings (GitHub Advanced Security)
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  secret-scanning:
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@586f66d7886cd0b037c7c245d4a6e34ef357ab10 # v3.94.1
        with:
          extra_args: --only-verified
