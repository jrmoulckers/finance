name: Web CI

on:
  push:
    branches: [main]
    paths: ['apps/web/**', 'packages/design-tokens/**']
  pull_request:
    branches: [main]
    paths: ['apps/web/**', 'packages/design-tokens/**']

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build -w packages/design-tokens

      - run: npm run build -w apps/web

      - run: npm test -w apps/web
        continue-on-error: true

      - name: Install Playwright browsers
        run: npx -w apps/web playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e -w apps/web
        continue-on-error: true

      - name: Lighthouse Audit
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12.6.2
        continue-on-error: true
        with:
          configPath: apps/web/lighthouserc.json
          uploadArtifacts: true
          runs: 3
