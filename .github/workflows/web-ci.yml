name: Web CI

on:
  push:
    branches: [main]
    paths: ['apps/web/**', 'packages/design-tokens/**']
  pull_request:
    branches: [main]
    paths: ['apps/web/**', 'packages/design-tokens/**']
  workflow_dispatch:

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build -w packages/design-tokens

      - run: npm run build -w apps/web

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-build
          path: |
            apps/web/dist/
            packages/design-tokens/build/

  unit-tests:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-build

      - run: npm test -w apps/web

  e2e-tests:
    name: E2E Tests (shard ${{ matrix.shard }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1/4, 2/4, 3/4, 4/4]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build -w packages/design-tokens

      - run: npm run build -w apps/web

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/web/package.json') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: npx -w apps/web playwright install --with-deps chromium

      - name: Run E2E tests (shard ${{ matrix.shard }})
        run: npx -w apps/web playwright test --shard=${{ matrix.shard }}

  lighthouse:
    name: Lighthouse Audit
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-build

      - name: Lighthouse Audit
        id: lighthouse-audit
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12.6.2
        continue-on-error: true
        with:
          configPath: apps/web/lighthouserc.json
          budgetPath: apps/web/budget.json
          uploadArtifacts: true
          runs: ${{ github.event_name == 'push' && 3 || 1 }}

      - name: Lighthouse Budget Check
        if: always() && (steps.lighthouse-audit.conclusion == 'success' || steps.lighthouse-audit.conclusion == 'failure')
        run: npx @lhci/cli assert --config=apps/web/lighthouserc-budget.json
        continue-on-error: false

  # ── Gate job ─────────────────────────────────────────────────────
  # Single required status check for branch protection.
  # Fails if any upstream job (unit tests, E2E shards, Lighthouse) fails.
  results:
    name: Web CI Results
    if: always()
    needs: [unit-tests, e2e-tests, lighthouse]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check upstream job results
        run: |
          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "::error::Unit tests failed"
            exit 1
          fi
          if [[ "${{ needs.e2e-tests.result }}" != "success" ]]; then
            echo "::error::E2E tests failed"
            exit 1
          fi
          if [[ "${{ needs.lighthouse.result }}" != "success" ]]; then
            echo "::error::Lighthouse audit failed"
            exit 1
          fi
          echo "✅ All web CI checks passed"
