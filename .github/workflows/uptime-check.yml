# =============================================================================
# Uptime Check — Beta web URL
# =============================================================================

name: Uptime Check

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: uptime-check
  cancel-in-progress: true

jobs:
  health:
    name: Check beta web uptime
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check beta URL with retries
        id: check
        env:
          BETA_UPTIME_URL: ${{ vars.BETA_UPTIME_URL }}
        run: |
          set +e

          if [ -n "${BETA_UPTIME_URL:-}" ]; then
            if [[ "$BETA_UPTIME_URL" == http://* || "$BETA_UPTIME_URL" == https://* ]]; then
              url="${BETA_UPTIME_URL%/}"
            else
              url="https://${BETA_UPTIME_URL%/}"
            fi
          else
            url="https://finance-staging.vercel.app"
          fi

          attempts=3
          delay_seconds=10
          curl_status=0
          status_code=000

          for attempt in $(seq 1 "$attempts"); do
            curl_output=$(curl --silent --show-error --location --max-time 10 --output /dev/null --write-out '%{http_code}' "$url" 2>&1)
            curl_status=$?
            status_code="${curl_output: -3}"

            if [ "$curl_status" -eq 0 ] && [ "$status_code" -ge 200 ] && [ "$status_code" -lt 400 ]; then
              break
            fi

            if [ "$attempt" -lt "$attempts" ]; then
              sleep "$delay_seconds"
            fi
          done

          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "status_code=$status_code" >> "$GITHUB_OUTPUT"
          echo "curl_status=$curl_status" >> "$GITHUB_OUTPUT"

          if [ "$curl_status" -ne 0 ] || [ "$status_code" -lt 200 ] || [ "$status_code" -ge 400 ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
            {
              echo "### Uptime check failed"
              echo ""
              echo "- URL: $url"
              echo "- HTTP status: $status_code"
              echo "- curl exit: $curl_status"
              echo "- Attempts: $attempts"
              echo "- Delay between retries: ${delay_seconds}s"
              echo "- Checked at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "failed=false" >> "$GITHUB_OUTPUT"
            echo "Beta uptime check passed with HTTP $status_code for $url after $attempt attempt(s)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Open or update uptime issue
        if: steps.check.outputs.failed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          HEALTH_URL: ${{ steps.check.outputs.url }}
          STATUS_CODE: ${{ steps.check.outputs.status_code }}
          CURL_STATUS: ${{ steps.check.outputs.curl_status }}
        run: |
          set -euo pipefail

          gh label create uptime --repo "$GITHUB_REPOSITORY" --color D73A4A --description "Uptime monitor alerts" --force >/dev/null
          gh label create beta --repo "$GITHUB_REPOSITORY" --color 1D76DB --description "Beta environment" --force >/dev/null

          body="Automated beta uptime check failed.

          - URL: ${HEALTH_URL}
          - HTTP status: ${STATUS_CODE}
          - curl exit: ${CURL_STATUS}
          - Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          - Checked at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          existing_issue=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --label uptime --label beta --json number --jq '.[0].number // empty')
          if [ -n "$existing_issue" ]; then
            gh issue comment "$existing_issue" --repo "$GITHUB_REPOSITORY" --body "$body"
          else
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "Beta uptime check failing" \
              --label uptime \
              --label beta \
              --body "$body"
          fi
