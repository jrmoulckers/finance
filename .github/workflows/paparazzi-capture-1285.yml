name: Capture Paparazzi snapshot (record)

on:
  push:
    branches:
      - chore/ci-capture-paparazzi-1285
  workflow_dispatch: {}

jobs:
  record-paparazzi:
    name: Record Paparazzi snapshot (AccountsSnapshotTest)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e

      - name: Run Paparazzi record for failing test
        run: |
          ./gradlew :apps:android:testDebugUnitTest --tests "*AccountsSnapshotTest*accountDetail_dark_2x" \
            -Dpaparazzi.record=true --no-daemon --no-build-cache --stacktrace

      - name: Upload Paparazzi artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: paparazzi-failures
          path: apps/android/build/paparazzi/failures/
          if-no-files-found: warn

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: android-test-results
          path: |
            apps/android/build/reports/tests/
            apps/android/build/test-results/
          if-no-files-found: warn
