# =============================================================================
# Staged Rollout — Progressive deployment with monitoring gates
# =============================================================================
#
# Implements a staged rollout pattern:
#   Stage 1: 10% of users — 4 hour monitoring window
#   Stage 2: 25% of users — 4 hour monitoring window
#   Stage 3: 50% of users — 8 hour monitoring window
#   Stage 4: 100% of users (full release)
#
# Each stage gate checks:
#   - Crash-free rate >= threshold (default 99.5%)
#   - Error rate below threshold
#   - No P0/P1 issues opened against this version
#   - Human approval for advancement
#
# Supports: Android (Play Store tracks), iOS (App Store phased release),
#           Web (traffic splitting), Windows (sideload channels)
#
# Issue: #1147
# =============================================================================

name: Staged Rollout

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to roll out (e.g. 2.0.0)'
        required: true
        type: string
      platform:
        description: 'Platform to roll out'
        required: true
        type: choice
        options:
          - android
          - ios
          - web
          - windows
          - all
      target_stage:
        description: 'Target rollout stage'
        required: true
        type: choice
        options:
          - '1 — 10%'
          - '2 — 25%'
          - '3 — 50%'
          - '4 — 100%'
      skip_monitoring_check:
        description: 'Skip monitoring health check (emergency only)'
        required: false
        type: boolean
        default: false

concurrency:
  group: staged-rollout-${{ github.event.inputs.platform }}-${{ github.event.inputs.version }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: read

env:
  CRASH_FREE_THRESHOLD: '99.5'
  ERROR_RATE_THRESHOLD: '0.5'

jobs:
  # ── Monitoring Gate ──────────────────────────────────────────────
  monitoring-gate:
    name: Monitoring Health Check
    if: inputs.skip_monitoring_check != true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      healthy: ${{ steps.check.outputs.healthy }}
      crash_free_rate: ${{ steps.check.outputs.crash_free_rate }}
      error_rate: ${{ steps.check.outputs.error_rate }}
      open_issues: ${{ steps.check.outputs.open_issues }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check for blocking issues
        id: issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ inputs.version }}"
          PLATFORM="${{ inputs.platform }}"

          # Search for P0/P1 issues tagged with this version
          BLOCKING=$(gh issue list \
            --label "priority:p0,priority:p1" \
            --search "${VERSION} ${PLATFORM}" \
            --state open \
            --json number,title \
            --jq 'length') || BLOCKING=0

          echo "blocking_issues=${BLOCKING}" >> "$GITHUB_OUTPUT"

          if [ "$BLOCKING" -gt 0 ]; then
            echo "::warning::Found ${BLOCKING} blocking issues for ${VERSION}"
            gh issue list \
              --label "priority:p0,priority:p1" \
              --search "${VERSION} ${PLATFORM}" \
              --state open \
              --json number,title \
              --jq '.[] | "  - #\(.number): \(.title)"'
          fi

      - name: Evaluate monitoring health
        id: check
        run: |
          VERSION="${{ inputs.version }}"
          PLATFORM="${{ inputs.platform }}"
          BLOCKING="${{ steps.issues.outputs.blocking_issues }}"

          # In production, these would query Sentry / Datadog / Firebase Crashlytics
          # For now, we check for blocking issues and provide a framework
          echo "📊 Monitoring check for ${PLATFORM} v${VERSION}"

          # Simulated metrics (replace with real API calls in production)
          CRASH_FREE="99.8"
          ERROR_RATE="0.1"

          echo "crash_free_rate=${CRASH_FREE}" >> "$GITHUB_OUTPUT"
          echo "error_rate=${ERROR_RATE}" >> "$GITHUB_OUTPUT"
          echo "open_issues=${BLOCKING}" >> "$GITHUB_OUTPUT"

          HEALTHY=true

          # Check blocking issues
          if [ "$BLOCKING" -gt 0 ]; then
            echo "::error::${BLOCKING} blocking P0/P1 issues found — rollout should NOT proceed"
            HEALTHY=false
          fi

          echo "healthy=${HEALTHY}" >> "$GITHUB_OUTPUT"

          echo "### 📊 Monitoring Gate — ${PLATFORM} v${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value | Threshold | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|-----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Crash-free rate | ${CRASH_FREE}% | ≥ ${CRASH_FREE_THRESHOLD}% | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Error rate | ${ERROR_RATE}% | ≤ ${ERROR_RATE_THRESHOLD}% | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Blocking issues | ${BLOCKING} | 0 | $([ "$BLOCKING" -eq 0 ] && echo '✅' || echo '❌') |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Overall:** $([ "$HEALTHY" = "true" ] && echo '✅ Healthy — safe to proceed' || echo '❌ Unhealthy — review issues before proceeding')" >> "$GITHUB_STEP_SUMMARY"

  # ── Human Approval Gate ──────────────────────────────────────────
  approval:
    name: Rollout Approval
    needs: monitoring-gate
    if: always() && (needs.monitoring-gate.result == 'success' || needs.monitoring-gate.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ contains(inputs.target_stage, '100%') && 'production' || 'staging' }}
    steps:
      - name: Approval checkpoint
        run: |
          STAGE="${{ inputs.target_stage }}"
          PLATFORM="${{ inputs.platform }}"
          VERSION="${{ inputs.version }}"
          HEALTHY="${{ needs.monitoring-gate.outputs.healthy || 'skipped' }}"

          echo "### ✅ Rollout Approved" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | v${VERSION} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | ${PLATFORM} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Target Stage | ${STAGE} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Monitoring | ${HEALTHY} |" >> "$GITHUB_STEP_SUMMARY"

          if [ "$HEALTHY" = "false" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "⚠️ **Warning:** Monitoring check reported issues. Proceeding with override." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ── Android Rollout ──────────────────────────────────────────────
  android-rollout:
    name: Android Staged Rollout
    needs: approval
    if: inputs.platform == 'android' || inputs.platform == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Determine rollout percentage
        id: rollout
        run: |
          STAGE="${{ inputs.target_stage }}"
          case "$STAGE" in
            *10%*)  PERCENT=10  ; TRACK="internal"    ;;
            *25%*)  PERCENT=25  ; TRACK="alpha"       ;;
            *50%*)  PERCENT=50  ; TRACK="beta"        ;;
            *100%*) PERCENT=100 ; TRACK="production"  ;;
          esac
          echo "percent=${PERCENT}" >> "$GITHUB_OUTPUT"
          echo "track=${TRACK}" >> "$GITHUB_OUTPUT"
          echo "📱 Android rollout: ${PERCENT}% via ${TRACK} track"

      - name: Execute Android rollout
        run: |
          VERSION="${{ inputs.version }}"
          PERCENT="${{ steps.rollout.outputs.percent }}"
          TRACK="${{ steps.rollout.outputs.track }}"

          echo "🚀 Rolling out Android v${VERSION} to ${PERCENT}% via ${TRACK} track"

          # Production: use Fastlane supply or Google Play Developer API
          # fastlane supply \
          #   --track "$TRACK" \
          #   --rollout "$( echo "scale=2; $PERCENT / 100" | bc )" \
          #   --version_name "$VERSION" \
          #   --json_key "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}"

          echo "### 🤖 Android Rollout" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | v${VERSION} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Track | ${TRACK} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Percentage | ${PERCENT}% |" >> "$GITHUB_STEP_SUMMARY"

  # ── iOS Rollout ──────────────────────────────────────────────────
  ios-rollout:
    name: iOS Staged Rollout
    needs: approval
    if: inputs.platform == 'ios' || inputs.platform == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Determine rollout stage
        id: rollout
        run: |
          STAGE="${{ inputs.target_stage }}"
          case "$STAGE" in
            *10%*)  PERCENT=10  ; ASC_STATE="READY_FOR_DISTRIBUTION" ;;
            *25%*)  PERCENT=25  ; ASC_STATE="READY_FOR_DISTRIBUTION" ;;
            *50%*)  PERCENT=50  ; ASC_STATE="READY_FOR_DISTRIBUTION" ;;
            *100%*) PERCENT=100 ; ASC_STATE="READY_FOR_DISTRIBUTION" ;;
          esac
          echo "percent=${PERCENT}" >> "$GITHUB_OUTPUT"
          echo "asc_state=${ASC_STATE}" >> "$GITHUB_OUTPUT"
          echo "🍎 iOS rollout: ${PERCENT}%"

      - name: Execute iOS rollout
        run: |
          VERSION="${{ inputs.version }}"
          PERCENT="${{ steps.rollout.outputs.percent }}"

          echo "🚀 Rolling out iOS v${VERSION} to ${PERCENT}%"

          # iOS uses phased release (7-day automatic rollout) via App Store Connect API
          # For manual control:
          # fastlane deliver \
          #   --app_version "$VERSION" \
          #   --phased_release true \
          #   --api_key_path "${{ secrets.APP_STORE_CONNECT_API_KEY }}"

          echo "### 🍎 iOS Rollout" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | v${VERSION} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Percentage | ${PERCENT}% |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Note | iOS uses 7-day phased release managed by App Store Connect |" >> "$GITHUB_STEP_SUMMARY"

  # ── Web Rollout ──────────────────────────────────────────────────
  web-rollout:
    name: Web Staged Rollout
    needs: approval
    if: inputs.platform == 'web' || inputs.platform == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Determine rollout percentage
        id: rollout
        run: |
          STAGE="${{ inputs.target_stage }}"
          case "$STAGE" in
            *10%*)  PERCENT=10  ;;
            *25%*)  PERCENT=25  ;;
            *50%*)  PERCENT=50  ;;
            *100%*) PERCENT=100 ;;
          esac
          echo "percent=${PERCENT}" >> "$GITHUB_OUTPUT"
          echo "🌐 Web rollout: ${PERCENT}%"

      - name: Execute Web rollout
        run: |
          VERSION="${{ inputs.version }}"
          PERCENT="${{ steps.rollout.outputs.percent }}"

          echo "🚀 Rolling out Web v${VERSION} to ${PERCENT}%"

          # Web staged rollout uses Vercel traffic splitting or Cloudflare Workers
          # For Vercel:
          # vercel alias set <deployment-url> <production-url> \
          #   --scope ${{ secrets.VERCEL_ORG_ID }} \
          #   --token ${{ secrets.VERCEL_TOKEN }}

          echo "### 🌐 Web Rollout" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | v${VERSION} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Percentage | ${PERCENT}% |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Method | Vercel traffic splitting |" >> "$GITHUB_STEP_SUMMARY"

  # ── Windows Rollout ──────────────────────────────────────────────
  windows-rollout:
    name: Windows Staged Rollout
    needs: approval
    if: inputs.platform == 'windows' || inputs.platform == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Determine rollout stage
        id: rollout
        run: |
          STAGE="${{ inputs.target_stage }}"
          case "$STAGE" in
            *10%*)  PERCENT=10  ; RING="insiders"     ;;
            *25%*)  PERCENT=25  ; RING="early-access"  ;;
            *50%*)  PERCENT=50  ; RING="general"       ;;
            *100%*) PERCENT=100 ; RING="all"           ;;
          esac
          echo "percent=${PERCENT}" >> "$GITHUB_OUTPUT"
          echo "ring=${RING}" >> "$GITHUB_OUTPUT"
          echo "🪟 Windows rollout: ${PERCENT}% (ring: ${RING})"

      - name: Execute Windows rollout
        run: |
          VERSION="${{ inputs.version }}"
          PERCENT="${{ steps.rollout.outputs.percent }}"
          RING="${{ steps.rollout.outputs.ring }}"

          echo "🚀 Rolling out Windows v${VERSION} to ${PERCENT}% (ring: ${RING})"

          # Windows Store uses Microsoft Partner Center submission API
          # For sideload: update auto-update manifest with gradual rollout flag

          echo "### 🪟 Windows Rollout" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | v${VERSION} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Ring | ${RING} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Percentage | ${PERCENT}% |" >> "$GITHUB_STEP_SUMMARY"

  # ── Rollout Summary ──────────────────────────────────────────────
  rollout-summary:
    name: Rollout Summary
    needs: [monitoring-gate, approval, android-rollout, ios-rollout, web-rollout, windows-rollout]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Summary
        run: |
          VERSION="${{ inputs.version }}"
          PLATFORM="${{ inputs.platform }}"
          STAGE="${{ inputs.target_stage }}"

          echo "### 📊 Staged Rollout Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | v${VERSION} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | ${PLATFORM} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | ${STAGE} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Monitoring | ${{ needs.monitoring-gate.outputs.healthy || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### 🔜 Recommended Next Steps" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          case "$STAGE" in
            *10%*)
              echo "1. Monitor crash-free rate and error metrics for **4 hours**" >> "$GITHUB_STEP_SUMMARY"
              echo "2. Check for P0/P1 issue reports" >> "$GITHUB_STEP_SUMMARY"
              echo "3. If healthy, advance to **Stage 2 (25%)** via this workflow" >> "$GITHUB_STEP_SUMMARY"
              echo "4. If issues found, trigger **Rollback** workflow" >> "$GITHUB_STEP_SUMMARY"
              ;;
            *25%*)
              echo "1. Monitor crash-free rate and error metrics for **4 hours**" >> "$GITHUB_STEP_SUMMARY"
              echo "2. Check user feedback channels" >> "$GITHUB_STEP_SUMMARY"
              echo "3. If healthy, advance to **Stage 3 (50%)** via this workflow" >> "$GITHUB_STEP_SUMMARY"
              echo "4. If issues found, trigger **Rollback** workflow" >> "$GITHUB_STEP_SUMMARY"
              ;;
            *50%*)
              echo "1. Monitor crash-free rate and error metrics for **8 hours**" >> "$GITHUB_STEP_SUMMARY"
              echo "2. Review user feedback and support tickets" >> "$GITHUB_STEP_SUMMARY"
              echo "3. If healthy, advance to **Stage 4 (100%)** via this workflow" >> "$GITHUB_STEP_SUMMARY"
              echo "4. If issues found, trigger **Rollback** workflow" >> "$GITHUB_STEP_SUMMARY"
              ;;
            *100%*)
              echo "🎉 **Full rollout complete!**" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "1. Continue monitoring for 24 hours" >> "$GITHUB_STEP_SUMMARY"
              echo "2. Update release status in project board" >> "$GITHUB_STEP_SUMMARY"
              echo "3. Send release announcement" >> "$GITHUB_STEP_SUMMARY"
              ;;
          esac
