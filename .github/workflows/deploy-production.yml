# Deploys a specific version to production. Triggers:
#   1. Manual workflow_dispatch trigger (version/component/rollback/reason)
#   2. Push of a global semver tag (v1.2.3, v1.2.3-rc.1)
#
# Gates (all triggers):
#   - Required CI workflows green on the exact SHA being deployed
#   - Human approval via "production" GitHub environment
#
# Rollbacks (workflow_dispatch with rollback=true) skip smoke tests and the CI
# wait gate so an already-known version can be restored quickly. Tag-triggered
# deploys always gate on CI and always run smoke tests.
#
# Features:
#   - Version selection (tag or commit SHA)
#   - Automated semver tag deploys for release parity with staging
#   - Pre-deployment smoke tests
#   - Rollback support (re-deploy previous version)
#   - GitHub Deployment status tracking
#   - Deployment notifications
#
# Issues: #886, #2057, #2060
# =============================================================================

name: Deploy — Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (tag like v1.0.0, or commit SHA)'
        required: true
        type: string
      component:
        description: 'Component to deploy'
        required: true
        type: choice
        options:
          - all
          - web
          - backend
      rollback:
        description: 'Is this a rollback? (skips smoke tests and CI gate)'
        required: false
        type: boolean
        default: false
      reason:
        description: 'Deployment reason (for audit trail)'
        required: true
        type: string
  push:
    tags:
      # Global semver release tags only; platform tags (v1.2.3-web, etc.) stay on release-*.yml.
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
      - '!v[0-9]+.[0-9]+.[0-9]+-web'
      - '!v[0-9]+.[0-9]+.[0-9]+-ios'
      - '!v[0-9]+.[0-9]+.[0-9]+-android'
      - '!v[0-9]+.[0-9]+.[0-9]+-windows'

concurrency:
  group: deploy-production
  cancel-in-progress: false # Never cancel production deployments

permissions:
  contents: read
  checks: read
  statuses: read
  deployments: write

env:
  ENVIRONMENT: production

jobs:
  # ---------------------------------------------------------------------------
  # Validate inputs and prepare deployment
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
      sha_short: ${{ steps.resolve.outputs.sha_short }}
      version: ${{ steps.resolve.outputs.version }}
      component: ${{ steps.deployment.outputs.component }}
      rollback: ${{ steps.deployment.outputs.rollback }}
      reason: ${{ steps.deployment.outputs.reason }}
      actor: ${{ steps.deployment.outputs.actor }}
      deploy_web: ${{ steps.components.outputs.web }}
      deploy_backend: ${{ steps.components.outputs.backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Resolve deployment inputs
        id: deployment
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_COMPONENT: ${{ github.event.inputs.component }}
          INPUT_ROLLBACK: ${{ github.event.inputs.rollback }}
          INPUT_REASON: ${{ github.event.inputs.reason }}
          ACTOR_NAME: ${{ github.actor }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            VERSION="$REF_NAME"
            COMPONENT="all"
            ROLLBACK="false"
            REASON="Automated deploy for tag $REF_NAME"
            ACTOR="$ACTOR_NAME (tag push)"
          else
            VERSION="$INPUT_VERSION"
            COMPONENT="$INPUT_COMPONENT"
            ROLLBACK="$INPUT_ROLLBACK"
            REASON="$INPUT_REASON"
            ACTOR="$ACTOR_NAME"
          fi

          {
            echo "version=$VERSION"
            echo "component=$COMPONENT"
            echo "rollback=$ROLLBACK"
            echo "reason=$REASON"
            echo "actor=$ACTOR"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve version to commit SHA
        id: resolve
        env:
          VERSION: ${{ steps.deployment.outputs.version }}
          COMPONENT: ${{ steps.deployment.outputs.component }}
          ROLLBACK: ${{ steps.deployment.outputs.rollback }}
          REASON: ${{ steps.deployment.outputs.reason }}
          ACTOR: ${{ steps.deployment.outputs.actor }}
        run: |
          # Try to resolve as a git ref (tag, branch, or commit SHA). Peel
          # annotated tags to the commit so deploy jobs always checkout a tree.
          SHA=$(git rev-parse --verify --quiet "$VERSION^{commit}" || echo "")

          if [ -z "$SHA" ]; then
            echo "::error::Could not resolve '$VERSION' to a commit"
            exit 1
          fi

          SHA_SHORT=$(echo "$SHA" | cut -c1-7)

          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          echo "### 🚀 Production Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`$VERSION\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`$SHA_SHORT\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | $COMPONENT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Rollback | $ROLLBACK |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Reason | $REASON |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | $ACTOR |" >> "$GITHUB_STEP_SUMMARY"

      - name: Determine components to deploy
        id: components
        run: |
          COMPONENT="${{ steps.deployment.outputs.component }}"
          if [ "$COMPONENT" = "all" ] || [ "$COMPONENT" = "web" ]; then
            echo "web=true" >> "$GITHUB_OUTPUT"
          else
            echo "web=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "$COMPONENT" = "all" ] || [ "$COMPONENT" = "backend" ]; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Gate: wait for required CI workflows on the resolved deploy SHA
  # ---------------------------------------------------------------------------
  verify-ci-green:
    name: Verify CI green on SHA
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [prepare]
    if: github.event.inputs.rollback != 'true'
    steps:
      - name: Wait for CI workflows
        uses: lewagon/wait-on-check-action@0dceb95e7c4cad8cc7422aee3885998f5cab9c79 # v1.4.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          running-workflow-name: 'Verify CI green on SHA'
          check-regexp: '^(Web CI|Android CI|iOS CI|Windows CI|Lint & Format|CI — Shared Packages|Security Scanning)$'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30
          allowed-conclusions: success,skipped

  # ---------------------------------------------------------------------------
  # Smoke tests (skipped on rollback)
  # ---------------------------------------------------------------------------
  smoke-tests:
    name: Pre-deploy Smoke Tests
    needs: prepare
    if: needs.prepare.outputs.rollback != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
    steps:
      - name: Checkout at deploy version
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web (production config)
        if: needs.prepare.outputs.deploy_web == 'true'
        env:
          NODE_ENV: production
          VITE_APP_VERSION: ${{ needs.prepare.outputs.version }}
          VITE_ENVIRONMENT: production
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_POWERSYNC_URL: ${{ secrets.POWERSYNC_URL }}
        run: npm run build -w apps/web

      - name: Verify web build env
        if: needs.prepare.outputs.deploy_web == 'true'
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node tools/verify-build-env.mjs --check-env apps/web/dist

      - name: Type check
        run: npm run type-check 2>/dev/null || true

      - name: Smoke test passed
        run: |
          echo "### ✅ Smoke Tests Passed" >> "$GITHUB_STEP_SUMMARY"
          echo "Build and type-check succeeded at \`${{ needs.prepare.outputs.sha_short }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Deploy Web to production
  # ---------------------------------------------------------------------------
  deploy-web:
    name: Deploy Web (Production)
    needs: [prepare, verify-ci-green, smoke-tests]
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.deploy_web == 'true' &&
      (needs.verify-ci-green.result == 'success' || needs.verify-ci-green.result == 'skipped') &&
      (needs.smoke-tests.result == 'success' || needs.smoke-tests.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout at deploy version
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NODE_ENV: production
          VITE_APP_VERSION: ${{ needs.prepare.outputs.version }}
          VITE_ENVIRONMENT: production
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_POWERSYNC_URL: ${{ secrets.POWERSYNC_URL }}
        run: |
          npm run build -w packages/design-tokens
          npm run build -w apps/web

      - name: Verify web build env
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node tools/verify-build-env.mjs --check-env apps/web/dist

      - name: Deploy to Vercel (production)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm i -g vercel@latest

          set -o pipefail
          DEPLOY_LOG=$(mktemp)
          if ! vercel deploy \
            --token="$VERCEL_TOKEN" \
            --scope="$VERCEL_ORG_ID" \
            --prod \
            --yes \
            --archive=tgz \
            apps/web/dist >"$DEPLOY_LOG" 2>&1; then
            echo "::error::Vercel production deploy failed:"
            cat "$DEPLOY_LOG"
            exit 1
          fi
          DEPLOY_URL=$(tail -1 "$DEPLOY_LOG")

          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "### 🌐 Web Production Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL:** $DEPLOY_URL" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Deploy Backend to production
  # ---------------------------------------------------------------------------
  deploy-backend:
    name: Deploy Backend (Production)
    needs: [prepare, verify-ci-green, smoke-tests]
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.deploy_backend == 'true' &&
      (needs.verify-ci-green.result == 'success' || needs.verify-ci-green.result == 'skipped') &&
      (needs.smoke-tests.result == 'success' || needs.smoke-tests.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production

    steps:
      - name: Checkout at deploy version
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Deploy to production server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '~/finance' }}
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "::warning::DEPLOY_HOST not configured — skipping backend deployment"
            echo "### ⚠️ Backend Production Skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "Configure DEPLOY_HOST, DEPLOY_SSH_KEY, and DEPLOY_USER secrets." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          VERSION="${{ needs.prepare.outputs.version }}"
          SHA="${{ needs.prepare.outputs.sha }}"

          # Set up SSH
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Deploy: checkout specific version, rebuild containers
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" << DEPLOY
            cd $DEPLOY_PATH
            git fetch origin
            git checkout $SHA
            docker compose -f deploy/docker-compose.yml pull
            docker compose -f deploy/docker-compose.yml up -d --remove-orphans

            # Caddy serves the public site and can safely start before backend
            # healthchecks settle. If compose left it Created because an
            # upstream was unhealthy, explicitly start/recreate just Caddy.
            caddy_started=false
            for attempt in 1 2 3; do
              if docker compose -f deploy/docker-compose.yml up -d --no-deps caddy \
                || docker compose -f deploy/docker-compose.yml start caddy; then
                caddy_started=true
                break
              fi
              echo "::warning::caddy start attempt ${attempt} failed; retrying"
              sleep 5
            done
            if [ "$caddy_started" != true ]; then
              echo "::warning::caddy was not confirmed started after retries"
            fi

            docker compose -f deploy/docker-compose.yml ps
            echo "Deployed version: $VERSION ($SHA)"
          DEPLOY

          echo "### 🐳 Backend Production Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "**Host:** \`$DEPLOY_HOST\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** \`$VERSION\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  # ---------------------------------------------------------------------------
  # Post-deployment summary and audit trail
  # ---------------------------------------------------------------------------
  post-deploy:
    name: Post-deployment
    needs: [prepare, deploy-web, deploy-backend]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Deployment audit trail
        run: |
          echo "### 📋 Production Deployment Record" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ needs.prepare.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ needs.prepare.outputs.sha_short }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Web | ${{ needs.deploy-web.result || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend | ${{ needs.deploy-backend.result || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Rollback | ${{ needs.prepare.outputs.rollback }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Reason | ${{ needs.prepare.outputs.reason }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deployed by | ${{ needs.prepare.outputs.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Timestamp | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any deployment failed
        if: needs.deploy-web.result == 'failure' || needs.deploy-backend.result == 'failure'
        run: |
          echo "::error::One or more deployments failed — check logs above"
          exit 1
