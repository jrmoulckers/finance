# =============================================================================
# Housekeeping — project automation, stale detection, and uptime checks
# =============================================================================
#
# Combines low-risk repository maintenance workflows so issue/project hygiene and uptime monitoring live in one scheduled workflow file.
# =============================================================================
name: Housekeeping

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]
  schedule:
    - cron: '*/15 * * * *'
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    inputs:
      task:
        description: 'Which housekeeping task to run manually'
        required: false
        type: choice
        default: all
        options:
          - all
          - uptime
          - stale

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: housekeeping-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  add-to-project:
    name: Auto-add to project
    if: github.event_name == 'issues' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Add to project
        if: ${{ env.ADD_TO_PROJECT_PAT != '' }}
        uses: actions/add-to-project@5afcf98fcd03f1c2f92c3c83f58ae24323cc57fd # v2.0.0
        env:
          ADD_TO_PROJECT_PAT: ${{ secrets.ADD_TO_PROJECT_PAT }}
        with:
          project-url: https://github.com/users/jrmoulckers/projects/2
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}

  stale:
    name: Flag stale issues
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 9 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (inputs.task == 'all' || inputs.task == 'stale'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10.3.0
        with:
          stale-issue-message: >-
            This issue has been inactive for 7 days. If it's still in progress,
            please provide a status update. If it's blocked, add the `blocked`
            label and describe the blocker.
          stale-issue-label: 'stale'
          days-before-stale: 7
          days-before-close: -1
          exempt-issue-labels: 'blocked,spike'
          operations-per-run: 30

  uptime:
    name: Check beta web uptime
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.task == 'all' || inputs.task == 'uptime'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check beta URL with retries
        id: check
        env:
          BETA_UPTIME_URL: ${{ vars.BETA_UPTIME_URL }}
        run: |
          set +e
          if [ -n "${BETA_UPTIME_URL:-}" ]; then
            if [[ "$BETA_UPTIME_URL" == http://* || "$BETA_UPTIME_URL" == https://* ]]; then
              url="${BETA_UPTIME_URL%/}"
            else
              url="https://${BETA_UPTIME_URL%/}"
            fi
          else
            url="https://finance-staging.vercel.app"
          fi
          attempts=3
          delay_seconds=10
          curl_status=0
          status_code=000
          for attempt in $(seq 1 "$attempts"); do
            curl_output=$(curl --silent --show-error --location --max-time 10 --output /dev/null --write-out '%{http_code}' "$url" 2>&1)
            curl_status=$?
            status_code="${curl_output: -3}"
            if [ "$curl_status" -eq 0 ] && [ "$status_code" -ge 200 ] && [ "$status_code" -lt 400 ]; then
              break
            fi
            [ "$attempt" -lt "$attempts" ] && sleep "$delay_seconds"
          done
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "status_code=$status_code" >> "$GITHUB_OUTPUT"
          echo "curl_status=$curl_status" >> "$GITHUB_OUTPUT"
          if [ "$curl_status" -ne 0 ] || [ "$status_code" -lt 200 ] || [ "$status_code" -ge 400 ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Open or update uptime issue
        if: steps.check.outputs.failed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          HEALTH_URL: ${{ steps.check.outputs.url }}
          STATUS_CODE: ${{ steps.check.outputs.status_code }}
          CURL_STATUS: ${{ steps.check.outputs.curl_status }}
        run: |
          set -euo pipefail
          gh label create uptime --repo "$GITHUB_REPOSITORY" --color D73A4A --description "Uptime monitor alerts" --force >/dev/null
          gh label create beta --repo "$GITHUB_REPOSITORY" --color 1D76DB --description "Beta environment" --force >/dev/null
          body="Automated beta uptime check failed.\n\n- URL: ${HEALTH_URL}\n- HTTP status: ${STATUS_CODE}\n- curl exit: ${CURL_STATUS}\n- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\n- Checked at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          existing_issue=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --label uptime --label beta --json number --jq '.[0].number // empty')
          if [ -n "$existing_issue" ]; then
            gh issue comment "$existing_issue" --repo "$GITHUB_REPOSITORY" --body "$body"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "Beta uptime check failing" --label uptime --label beta --body "$body"
          fi
