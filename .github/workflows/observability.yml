# =============================================================================
# Observability Stack — Structured logging, error tracking, metrics collection
# =============================================================================
#
# Validates and enforces observability standards across the monorepo:
#   - Structured logging format compliance
#   - Error tracking integration validation
#   - Performance metric collection (build times, bundle sizes, test durations)
#   - Observability report generation
#
# Sprint: 13
# =============================================================================

name: Observability

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'services/**'
      - 'tools/observability/**'

  pull_request:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'services/**'
      - 'tools/observability/**'

  # Weekly observability health check
  schedule:
    - cron: '0 6 * * 2' # Tuesdays 6 AM UTC

  workflow_dispatch:

concurrency:
  group: observability-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Structured Logging Compliance
  # ---------------------------------------------------------------------------
  logging-standards:
    name: Logging Standards
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Check for console.log in production code
        id: console-check
        run: |
          VIOLATIONS=0
          VIOLATION_FILES=""

          echo "### 📋 Structured Logging Compliance" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Check TypeScript/JavaScript for raw console.log (should use structured logger)
          echo "#### Console.log Usage (should use structured logger)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Search for console.log in production source files (not test files)
          CONSOLE_HITS=$(grep -rn 'console\.log\|console\.warn\|console\.error' \
            --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' \
            apps/web/src/ services/api/src/ packages/*/src/ 2>/dev/null \
            | grep -v '\.test\.' \
            | grep -v '\.spec\.' \
            | grep -v '__tests__' \
            | grep -v 'node_modules' \
            | grep -v '// eslint-disable' \
            || echo "")

          if [ -n "$CONSOLE_HITS" ]; then
            COUNT=$(echo "$CONSOLE_HITS" | wc -l)
            VIOLATIONS=$((VIOLATIONS + COUNT))
            echo "⚠️ Found **$COUNT** raw console.log usage(s) in production code:" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$CONSOLE_HITS" | head -20 >> "$GITHUB_STEP_SUMMARY"
            if [ "$COUNT" -gt 20 ]; then
              echo "... and $((COUNT - 20)) more" >> "$GITHUB_STEP_SUMMARY"
            fi
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Found $COUNT raw console.log usages — prefer structured logger"
          else
            echo "✅ No raw console.log found in production code" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "violations=$VIOLATIONS" >> "$GITHUB_OUTPUT"

      - name: Check for sensitive data logging
        id: sensitive-check
        run: |
          SENSITIVE_VIOLATIONS=0

          echo "#### Sensitive Data Logging Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Patterns that should NEVER appear in log statements
          SENSITIVE_PATTERNS=(
            'password'
            'access_token'
            'refresh_token'
            'api_key'
            'apiKey'
            'secret'
            'creditCard'
            'credit_card'
            'ssn'
            'social_security'
          )

          for pattern in "${SENSITIVE_PATTERNS[@]}"; do
            # Look for log statements containing sensitive patterns
            HITS=$(grep -rn "console\.\|log\.\|logger\.\|Log\." \
              --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' \
              --include='*.kt' --include='*.swift' \
              apps/ packages/ services/ 2>/dev/null \
              | grep -i "$pattern" \
              | grep -v '\.test\.' \
              | grep -v '\.spec\.' \
              | grep -v 'node_modules' \
              | grep -v '// SAFE:' \
              | grep -v '# nosec' \
              || echo "")

            if [ -n "$HITS" ]; then
              COUNT=$(echo "$HITS" | wc -l)
              SENSITIVE_VIOLATIONS=$((SENSITIVE_VIOLATIONS + COUNT))
              echo "::error::Potential sensitive data in logs matching '$pattern' ($COUNT occurrences)"
              echo "- ❌ Pattern \`$pattern\`: $COUNT potential violation(s)" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          if [ "$SENSITIVE_VIOLATIONS" -eq 0 ]; then
            echo "✅ No sensitive data patterns found in log statements" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "🔴 **$SENSITIVE_VIOLATIONS potential sensitive data logging violation(s)**" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "sensitive_violations=$SENSITIVE_VIOLATIONS" >> "$GITHUB_OUTPUT"

      - name: Validate Kotlin logging patterns
        id: kotlin-logging
        run: |
          KOTLIN_ISSUES=0

          echo "#### Kotlin Logging Patterns" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Check for println in Kotlin production code (should use structured logging)
          PRINTLN_HITS=$(grep -rn 'println\|System\.out\|System\.err' \
            --include='*.kt' \
            apps/ packages/ services/ 2>/dev/null \
            | grep -v 'Test' \
            | grep -v 'test' \
            | grep -v 'build/' \
            || echo "")

          if [ -n "$PRINTLN_HITS" ]; then
            COUNT=$(echo "$PRINTLN_HITS" | wc -l)
            KOTLIN_ISSUES=$((KOTLIN_ISSUES + COUNT))
            echo "⚠️ Found **$COUNT** println/System.out usage(s) in Kotlin code" >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Found $COUNT println usages in Kotlin — use structured logger"
          else
            echo "✅ No println/System.out found in Kotlin production code" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "kotlin_issues=$KOTLIN_ISSUES" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Performance Metrics Collection
  # ---------------------------------------------------------------------------
  collect-metrics:
    name: Collect Performance Metrics
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect build metrics
        id: build-metrics
        run: |
          echo "### 📊 Performance Metrics" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Measure npm install time
          INSTALL_START=$SECONDS
          npm ci --ignore-scripts 2>/dev/null || true
          INSTALL_DURATION=$((SECONDS - INSTALL_START))

          # Measure design tokens build
          TOKENS_START=$SECONDS
          npm run build -w packages/design-tokens 2>/dev/null || true
          TOKENS_DURATION=$((SECONDS - TOKENS_START))

          # Measure web build (if applicable)
          WEB_START=$SECONDS
          npm run build -w apps/web 2>/dev/null || true
          WEB_DURATION=$((SECONDS - WEB_START))

          echo "#### Build Timings" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Duration |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|----------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| npm ci | ${INSTALL_DURATION}s |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Design tokens | ${TOKENS_DURATION}s |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Web build | ${WEB_DURATION}s |" >> "$GITHUB_STEP_SUMMARY"

          echo "npm_install_time=$INSTALL_DURATION" >> "$GITHUB_OUTPUT"
          echo "tokens_build_time=$TOKENS_DURATION" >> "$GITHUB_OUTPUT"
          echo "web_build_time=$WEB_DURATION" >> "$GITHUB_OUTPUT"

      - name: Measure bundle sizes
        id: bundle-sizes
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Bundle Sizes" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Asset | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|------|" >> "$GITHUB_STEP_SUMMARY"

          # Web bundle
          if [ -d "apps/web/dist" ]; then
            TOTAL=$(du -sh apps/web/dist/ 2>/dev/null | cut -f1)
            JS_SIZE=$(find apps/web/dist -name '*.js' -exec du -cb {} + 2>/dev/null | tail -1 | cut -f1 || echo "0")
            CSS_SIZE=$(find apps/web/dist -name '*.css' -exec du -cb {} + 2>/dev/null | tail -1 | cut -f1 || echo "0")
            echo "| Web total | $TOTAL |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Web JS | $((JS_SIZE / 1024))KB |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Web CSS | $((CSS_SIZE / 1024))KB |" >> "$GITHUB_STEP_SUMMARY"
            echo "web_bundle_js=$((JS_SIZE / 1024))" >> "$GITHUB_OUTPUT"
            echo "web_bundle_css=$((CSS_SIZE / 1024))" >> "$GITHUB_OUTPUT"
          else
            echo "| Web | Build not available |" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Design tokens
          if [ -d "packages/design-tokens/build" ]; then
            TOKENS_SIZE=$(du -sh packages/design-tokens/build/ 2>/dev/null | cut -f1)
            echo "| Design tokens | $TOKENS_SIZE |" >> "$GITHUB_STEP_SUMMARY"
          fi

          # node_modules size
          if [ -d "node_modules" ]; then
            NM_SIZE=$(du -sh node_modules/ 2>/dev/null | cut -f1)
            echo "| node_modules | $NM_SIZE |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Measure dependency counts
        id: dep-counts
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Dependency Health" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Count direct dependencies
          PROD_DEPS=$(node -e "const p=require('./package.json'); console.log(Object.keys(p.dependencies||{}).length)")
          DEV_DEPS=$(node -e "const p=require('./package.json'); console.log(Object.keys(p.devDependencies||{}).length)")

          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Production deps | $PROD_DEPS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dev deps | $DEV_DEPS |" >> "$GITHUB_STEP_SUMMARY"

          # Count workspaces
          WORKSPACE_COUNT=$(node -e "const p=require('./package.json'); console.log((p.workspaces||[]).length)")
          echo "| Workspaces | $WORKSPACE_COUNT |" >> "$GITHUB_STEP_SUMMARY"

          # Check for outdated packages (non-blocking)
          echo "" >> "$GITHUB_STEP_SUMMARY"
          OUTDATED=$(npm outdated --json 2>/dev/null || echo '{}')
          OUTDATED_COUNT=$(echo "$OUTDATED" | python3 -c "import json,sys; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")
          echo "| Outdated packages | $OUTDATED_COUNT |" >> "$GITHUB_STEP_SUMMARY"

      - name: Repository size metrics
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Repository Metrics" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"

          # Total lines of code (excluding generated/deps)
          TS_LINES=$(find apps/ packages/ services/ -name '*.ts' -o -name '*.tsx' 2>/dev/null \
            | grep -v node_modules | grep -v build | grep -v dist \
            | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}' || echo "0")
          KT_LINES=$(find apps/ packages/ -name '*.kt' 2>/dev/null \
            | grep -v build | grep -v node_modules \
            | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}' || echo "0")
          SWIFT_LINES=$(find apps/ios -name '*.swift' 2>/dev/null \
            | grep -v build | grep -v .build \
            | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}' || echo "0")

          echo "| TypeScript/TSX lines | $TS_LINES |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Kotlin lines | $KT_LINES |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Swift lines | $SWIFT_LINES |" >> "$GITHUB_STEP_SUMMARY"

          # Workflow count
          WF_COUNT=$(ls -1 .github/workflows/*.yml 2>/dev/null | wc -l)
          echo "| CI workflows | $WF_COUNT |" >> "$GITHUB_STEP_SUMMARY"

          # Git stats
          COMMIT_COUNT=$(git rev-list --count HEAD 2>/dev/null || echo "?")
          CONTRIBUTOR_COUNT=$(git shortlog -sn --no-merges HEAD 2>/dev/null | wc -l || echo "?")
          echo "| Total commits | $COMMIT_COUNT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Contributors | $CONTRIBUTOR_COUNT |" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Error Tracking Validation
  # ---------------------------------------------------------------------------
  error-tracking:
    name: Error Tracking Setup
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate error boundary coverage
        id: error-boundaries
        run: |
          echo "### 🛡️ Error Tracking Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Error Boundary Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Check for error boundaries in web app
          EB_COUNT=$(grep -rl 'ErrorBoundary\|errorBoundary\|error-boundary' \
            --include='*.ts' --include='*.tsx' \
            apps/web/src/ 2>/dev/null | wc -l || echo "0")

          # Check for try-catch in API routes
          TC_COUNT=$(grep -rl 'try\s*{' \
            --include='*.ts' --include='*.js' \
            services/api/src/ 2>/dev/null | wc -l || echo "0")

          echo "| Platform | Coverage |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|----------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Web error boundaries | $EB_COUNT files |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API try-catch handlers | $TC_COUNT files |" >> "$GITHUB_STEP_SUMMARY"

          if [ "$EB_COUNT" -eq 0 ]; then
            echo "::warning::No error boundaries found in web app"
          fi

      - name: Check source map configuration
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Source Map Configuration" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Check if source maps are configured for error tracking
          SOURCEMAP_CONFIGS=0

          if grep -r 'sourcemap\|sourceMap\|source-map' apps/web/vite.config.* 2>/dev/null | grep -v node_modules > /dev/null; then
            echo "- ✅ Web: Source maps configured in Vite" >> "$GITHUB_STEP_SUMMARY"
            SOURCEMAP_CONFIGS=$((SOURCEMAP_CONFIGS + 1))
          else
            echo "- ⚠️ Web: No source map configuration found" >> "$GITHUB_STEP_SUMMARY"
          fi

          if grep -r 'proguard\|R8\|minifyEnabled' apps/android/build.gradle* 2>/dev/null | grep -v node_modules > /dev/null; then
            echo "- ✅ Android: ProGuard/R8 configured" >> "$GITHUB_STEP_SUMMARY"
            SOURCEMAP_CONFIGS=$((SOURCEMAP_CONFIGS + 1))
          else
            echo "- ⚠️ Android: No ProGuard configuration found" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Observability checklist
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Observability Checklist" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          check_exists() {
            if [ -e "$2" ]; then
              echo "- ✅ $1" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- ❌ $1 (missing: \`$2\`)" >> "$GITHUB_STEP_SUMMARY"
            fi
          }

          check_exists "Monitoring stack" "deploy/monitoring/docker-compose.monitoring.yml"
          check_exists "Performance budget" "performance.budget.json"
          check_exists "CI health monitor" ".github/workflows/ci-health.yml"
          check_exists "Security scanning" ".github/workflows/security.yml"
          check_exists "Staging deploy" ".github/workflows/deploy-staging.yml"
          check_exists "Production deploy" ".github/workflows/deploy-production.yml"
          check_exists "Canary deploy" ".github/workflows/canary-deploy.yml"
          check_exists "Load tests" ".github/workflows/load-tests.yml"
