# =============================================================================
# Shared Packages CI — KMP package build, tests, and coverage
# =============================================================================
#
# Validates shared Kotlin Multiplatform packages that feed multiple apps and publishes coverage plus JUnit artifacts.
# =============================================================================
name: CI — Shared

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'build-logic/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'build-logic/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'

concurrency:
  group: ci-shared-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  GRADLE_OPTS: >-
    -Xmx2g
    -XX:MaxMetaspaceSize=512m
    -Dorg.gradle.daemon=false
    -Dorg.gradle.parallel=true
    -Dorg.gradle.caching=true
    -Dorg.gradle.configureondemand=true
    -Dkotlin.incremental=true
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  lint-and-test:
    name: Lint & Test (KMP)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          dependency-graph: generate

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Cache Kotlin/Native prebuilt
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Build shared packages
        id: build
        run: |
          BUILD_START=$SECONDS
          ./gradlew :packages:core:build :packages:models:build :packages:sync:build \
            -x jsBrowserTest -x allTests \
            --parallel --build-cache --scan --stacktrace
          echo "duration=$(( SECONDS - BUILD_START ))" >> "$GITHUB_OUTPUT"

      - name: Run JVM tests
        id: test
        run: |
          TEST_START=$SECONDS
          ./gradlew :packages:core:jvmTest :packages:models:jvmTest :packages:sync:jvmTest \
            --parallel --build-cache --stacktrace
          echo "duration=$(( SECONDS - TEST_START ))" >> "$GITHUB_OUTPUT"

      - name: Generate coverage report
        run: ./gradlew :packages:core:koverXmlReport :packages:sync:koverXmlReport --parallel --build-cache
        continue-on-error: true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: '**/build/reports/kover/**'
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: warn
          retention-days: 14

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: KMP Test Results
          path: '**/build/test-results/**/TEST-*.xml'
          reporter: java-junit
          fail-on-error: true

      - name: CI Summary
        if: always()
        run: |
          echo "### 📦 Shared Packages CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build duration | ${{ steps.build.outputs.duration || 'N/A' }}s |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test duration | ${{ steps.test.outputs.duration || 'N/A' }}s |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gradle cache | ${{ github.ref == 'refs/heads/main' && 'read-write' || 'read-only' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Runner | \`${{ runner.os }}\` |" >> "$GITHUB_STEP_SUMMARY"
