# =============================================================================
# Mobile CI Optimization — Gradle cache warming, Xcode caching, parallel tests
# =============================================================================
#
# Optimizes Android and iOS CI build times:
#   - Gradle build cache warming (runs on main, populates cache for PRs)
#   - Xcode derived data caching with content-addressed keys
#   - Parallel test execution configuration
#   - Build time tracking and regression detection
#
# Sprint: 14
# =============================================================================

name: Mobile CI Cache Warming

on:
  push:
    branches: [main]
    paths:
      - 'apps/android/**'
      - 'apps/ios/**'
      - 'packages/**'
      - 'build-logic/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'

  # Warm caches weekly even without code changes
  schedule:
    - cron: '0 3 * * 0' # Sundays 3 AM UTC

  workflow_dispatch:

concurrency:
  group: mobile-cache-warm-${{ github.ref }}
  cancel-in-progress: false # Don't cancel cache warming

permissions:
  contents: read

env:
  GRADLE_OPTS: >-
    -Xmx4g
    -XX:MaxMetaspaceSize=512m
    -Dorg.gradle.daemon=false
    -Dorg.gradle.parallel=true
    -Dorg.gradle.caching=true
    -Dorg.gradle.configureondemand=true
    -Dkotlin.incremental=true

jobs:
  # ---------------------------------------------------------------------------
  # Android: Gradle Build Cache Warming
  # ---------------------------------------------------------------------------
  android-cache-warm:
    name: Android — Warm Gradle Cache
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      # Write-enabled Gradle cache (this is main branch)
      - name: Set up Gradle (read-write cache)
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: false
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          gradle-home-cache-includes: |
            caches
            notifications
            jdks
            wrapper

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      # Optimized Kotlin/Native cache with granular key
      - name: Cache Kotlin/Native prebuilt
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml') }}-${{ hashFiles('build-logic/**/*.kts') }}
          restore-keys: |
            ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml') }}
            ${{ runner.os }}-konan-

      # Cache Android build intermediates
      - name: Cache Android build outputs
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            apps/android/build/intermediates
            apps/android/build/generated
            apps/android/build/tmp
            packages/*/build/classes
            packages/*/build/kotlin
          key: ${{ runner.os }}-android-build-${{ hashFiles('**/*.kt', '**/*.kts', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-android-build-

      - name: Warm Gradle configuration cache
        id: config-cache
        run: |
          CONFIG_START=$SECONDS
          ./gradlew --configuration-cache help 2>/dev/null || true
          echo "config_cache_duration=$(( SECONDS - CONFIG_START ))" >> "$GITHUB_OUTPUT"

      - name: Build shared packages (cache warm)
        id: packages-build
        run: |
          BUILD_START=$SECONDS
          ./gradlew :packages:core:build :packages:models:build :packages:sync:build \
            -x jsBrowserTest -x allTests \
            --parallel --build-cache --scan --stacktrace \
            -Dorg.gradle.workers.max=4
          echo "duration=$(( SECONDS - BUILD_START ))" >> "$GITHUB_OUTPUT"

      - name: Compile Android debug (cache warm)
        id: android-compile
        run: |
          COMPILE_START=$SECONDS
          ./gradlew :apps:android:compileDebugKotlin \
            --parallel --build-cache --stacktrace \
            -Dorg.gradle.workers.max=4
          echo "duration=$(( SECONDS - COMPILE_START ))" >> "$GITHUB_OUTPUT"

      - name: Run Android unit tests (parallel)
        id: android-test
        run: |
          TEST_START=$SECONDS
          ./gradlew :apps:android:testDebugUnitTest \
            --parallel --build-cache --stacktrace \
            -Dorg.gradle.workers.max=4 \
            -Pandroid.testInstrumentationRunnerArguments.numShards=2
          echo "duration=$(( SECONDS - TEST_START ))" >> "$GITHUB_OUTPUT"

      - name: Assemble debug APK (cache warm)
        id: apk-build
        run: |
          APK_START=$SECONDS
          ./gradlew :apps:android:assembleDebug \
            --parallel --build-cache --stacktrace
          echo "duration=$(( SECONDS - APK_START ))" >> "$GITHUB_OUTPUT"

      - name: Android cache warming summary
        if: always()
        run: |
          echo "### 🤖 Android Cache Warming Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Duration | Cache |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Config cache | ${{ steps.config-cache.outputs.config_cache_duration || 'N/A' }}s | write |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Shared packages | ${{ steps.packages-build.outputs.duration || 'N/A' }}s | write |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Android compile | ${{ steps.android-compile.outputs.duration || 'N/A' }}s | write |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Unit tests | ${{ steps.android-test.outputs.duration || 'N/A' }}s | write |" >> "$GITHUB_STEP_SUMMARY"
          echo "| APK assembly | ${{ steps.apk-build.outputs.duration || 'N/A' }}s | write |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "ℹ️ PR builds will read from these caches (read-only mode)" >> "$GITHUB_STEP_SUMMARY"

          # Report APK size
          APK=$(find apps/android/build/outputs/apk/debug -name '*.apk' 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            SIZE=$(du -sh "$APK" | cut -f1)
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Debug APK size:** $SIZE" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ---------------------------------------------------------------------------
  # iOS: Xcode Derived Data & SPM Cache Warming
  # ---------------------------------------------------------------------------
  ios-cache-warm:
    name: iOS — Warm Xcode Cache
    runs-on: macos-15
    timeout-minutes: 30

    env:
      SPM_CACHE_DIR: apps/ios/.spm-packages
      DERIVED_DATA_DIR: apps/ios/.derivedData

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable

      # SPM package cache with content-addressed key
      - name: Cache SPM packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.SPM_CACHE_DIR }}
          key: ${{ runner.os }}-spm-warm-${{ hashFiles('apps/ios/Package.resolved', 'apps/ios/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-warm-
            ${{ runner.os }}-spm-pkgs-

      # DerivedData cache with multi-level restore keys
      - name: Cache DerivedData
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.DERIVED_DATA_DIR }}
          key: ${{ runner.os }}-dd-warm-${{ hashFiles('apps/ios/Package.resolved', 'apps/ios/**/*.swift', 'apps/ios/**/*.xib', 'apps/ios/**/*.storyboard') }}
          restore-keys: |
            ${{ runner.os }}-dd-warm-${{ hashFiles('apps/ios/Package.resolved') }}
            ${{ runner.os }}-dd-warm-
            ${{ runner.os }}-dd-

      # Swift build cache
      - name: Cache Swift build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            apps/ios/.build
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-swift-build-${{ hashFiles('apps/ios/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-build-

      - name: Resolve SPM dependencies
        id: spm-resolve
        run: |
          cd apps/ios
          RESOLVE_START=$SECONDS
          xcodebuild -resolvePackageDependencies \
            -scheme FinanceApp \
            -clonedSourcePackagesDirPath "${{ github.workspace }}/${{ env.SPM_CACHE_DIR }}" \
            2>&1 | tail -5
          echo "duration=$(( SECONDS - RESOLVE_START ))" >> "$GITHUB_OUTPUT"

      - name: Build iOS (cache warm)
        id: ios-build
        run: |
          cd apps/ios
          BUILD_START=$SECONDS
          xcodebuild build \
            -scheme FinanceApp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -clonedSourcePackagesDirPath "${{ github.workspace }}/${{ env.SPM_CACHE_DIR }}" \
            -derivedDataPath "${{ github.workspace }}/${{ env.DERIVED_DATA_DIR }}" \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -parallelizeTargets \
            2>&1 | tail -10
          echo "duration=$(( SECONDS - BUILD_START ))" >> "$GITHUB_OUTPUT"

      - name: Run iOS tests (parallel)
        id: ios-test
        run: |
          cd apps/ios
          TEST_START=$SECONDS
          xcodebuild test \
            -scheme FinanceApp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -clonedSourcePackagesDirPath "${{ github.workspace }}/${{ env.SPM_CACHE_DIR }}" \
            -derivedDataPath "${{ github.workspace }}/${{ env.DERIVED_DATA_DIR }}" \
            CODE_SIGNING_ALLOWED=NO \
            -parallel-testing-enabled YES \
            -maximum-parallel-testing-workers 4 \
            -enableCodeCoverage YES \
            -resultBundlePath .build/TestResults.xcresult \
            2>&1 | tail -15
          echo "duration=$(( SECONDS - TEST_START ))" >> "$GITHUB_OUTPUT"

      - name: iOS cache warming summary
        if: always()
        run: |
          echo "### 🍎 iOS Cache Warming Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Duration | Cache |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| SPM resolve | ${{ steps.spm-resolve.outputs.duration || 'N/A' }}s | write |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Xcode build | ${{ steps.ios-build.outputs.duration || 'N/A' }}s | write |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests (parallel) | ${{ steps.ios-test.outputs.duration || 'N/A' }}s | write |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "ℹ️ PR builds will read from these caches (matching restore keys)" >> "$GITHUB_STEP_SUMMARY"

          # Report DerivedData size
          DD_SIZE=$(du -sh "${{ github.workspace }}/${{ env.DERIVED_DATA_DIR }}" 2>/dev/null | cut -f1 || echo "N/A")
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**DerivedData size:** $DD_SIZE" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Build Time Tracking & Regression Detection
  # ---------------------------------------------------------------------------
  track-build-times:
    name: Track Build Performance
    needs: [android-cache-warm, ios-cache-warm]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build performance report
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            let report = `## 📱 Mobile CI Performance Report\n\n`;
            report += `**Date:** ${new Date().toISOString().split('T')[0]}\n`;
            report += `**Commit:** \`${context.sha.slice(0, 7)}\`\n\n`;

            // Android metrics
            report += `### 🤖 Android\n\n`;
            report += `| Metric | Status |\n|--------|--------|\n`;
            report += `| Cache warming | ${{ needs.android-cache-warm.result }} |\n`;
            report += `| Gradle cache | read-write (main branch) |\n`;
            report += `| Parallel workers | 4 |\n`;
            report += `| Configuration cache | enabled |\n\n`;

            // iOS metrics
            report += `### 🍎 iOS\n\n`;
            report += `| Metric | Status |\n|--------|--------|\n`;
            report += `| Cache warming | ${{ needs.ios-cache-warm.result }} |\n`;
            report += `| SPM cache | content-addressed |\n`;
            report += `| DerivedData cache | multi-level restore |\n`;
            report += `| Parallel testing | 4 workers |\n\n`;

            // Optimization tips
            report += `### 💡 Optimization Notes\n\n`;
            report += `- PR builds use **read-only** Gradle cache from this warming run\n`;
            report += `- iOS DerivedData uses multi-level cache restore keys for partial hits\n`;
            report += `- Kotlin incremental compilation enabled via gradle.properties\n`;
            report += `- Configuration cache reduces Gradle configuration phase time\n`;

            core.summary.addRaw(report);
            await core.summary.write();
