# =============================================================================
# Release Train Automation — Automated version bump, changelog, and platform builds
# =============================================================================
#
# Orchestrates the full release process:
#   1. Version bump via changesets
#   2. Changelog generation from conventional commits
#   3. Release notes PR creation
#   4. Tag creation after merge
#   5. Platform build triggers (Android, iOS, Web, Windows)
#
# Human approval gates:
#   - Release notes PR must be reviewed and merged
#   - Platform artifact builds require "release" environment approval
#
# Sprint: 15
# =============================================================================

name: Release Train

on:
  # Manual trigger to start a release
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      prerelease_tag:
        description: 'Pre-release tag (only for prerelease type, e.g. beta, rc)'
        required: false
        type: string
        default: 'beta'
      skip_changelog:
        description: 'Skip changelog generation (use changesets only)'
        required: false
        type: boolean
        default: false
      skip_smoke_tests:
        description: 'Skip pre-release smoke tests'
        required: false
        type: boolean
        default: false
      generate_store_metadata:
        description: 'Generate store submission metadata'
        required: false
        type: boolean
        default: true
      dry_run:
        description: 'Dry run — validate without creating anything'
        required: false
        type: boolean
        default: false

  # Also trigger when changesets version PR is merged
  push:
    branches: [main]
    paths:
      - '.changeset/**'

concurrency:
  group: release-train
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Prepare: Determine version, validate state
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      current_version: ${{ steps.version.outputs.current }}
      next_version: ${{ steps.version.outputs.next }}
      tag: ${{ steps.version.outputs.tag }}
      has_changesets: ${{ steps.changesets.outputs.has_changesets }}
      changelog: ${{ steps.changelog.outputs.has_changelog }}
      is_dry_run: ${{ github.event.inputs.dry_run || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for pending changesets
        id: changesets
        run: |
          CHANGESET_FILES=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l)
          echo "has_changesets=$( [ "$CHANGESET_FILES" -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "changeset_count=$CHANGESET_FILES" >> "$GITHUB_OUTPUT"

      - name: Determine version
        id: version
        run: |
          # Get current version from package.json
          CURRENT=$(node -e "console.log(require('./package.json').version)")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          RELEASE_TYPE="${{ github.event.inputs.release_type || 'patch' }}"
          PRERELEASE_TAG="${{ github.event.inputs.prerelease_tag || 'beta' }}"

          # Calculate next version
          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT%-*}"

          case "$RELEASE_TYPE" in
            major)
              NEXT="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEXT="${MAJOR}.$((MINOR + 1)).0"
              ;;
            patch)
              NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
              ;;
            prerelease)
              # Check if already a prerelease
              if [[ "$CURRENT" == *"-"* ]]; then
                # Increment prerelease number
                PRE_NUM=$(echo "$CURRENT" | grep -oP '\d+$' || echo "0")
                BASE=$(echo "$CURRENT" | sed 's/-.*$//')
                NEXT="${BASE}-${PRERELEASE_TAG}.$((PRE_NUM + 1))"
              else
                NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))-${PRERELEASE_TAG}.1"
              fi
              ;;
          esac

          TAG="v${NEXT}"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          echo "### 🚂 Release Train" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Current version | \`$CURRENT\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Next version | \`$NEXT\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | \`$TAG\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release type | $RELEASE_TYPE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Changesets pending | ${{ steps.changesets.outputs.changeset_count }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dry run | ${{ github.event.inputs.dry_run || 'false' }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Generate changelog
        id: changelog
        if: github.event.inputs.skip_changelog != 'true'
        run: |
          PREV_TAG=$(git tag --sort=-version:refname --list 'v*' | head -1)

          if [ -n "$PREV_TAG" ]; then
            node tools/generate-changelog.js --from "$PREV_TAG" --to HEAD > release-changelog.md 2>/dev/null || true
          else
            node tools/generate-changelog.js > release-changelog.md 2>/dev/null || true
          fi

          if [ -s release-changelog.md ]; then
            echo "has_changelog=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changelog=false" >> "$GITHUB_OUTPUT"
            # Fallback changelog
            echo "## ${{ steps.version.outputs.tag }}" > release-changelog.md
            echo "" >> release-changelog.md
            echo "### Changes" >> release-changelog.md
            echo "" >> release-changelog.md
            if [ -n "$PREV_TAG" ]; then
              git log --pretty=format:"- %s" "$PREV_TAG..HEAD" >> release-changelog.md
            else
              echo "- Initial release" >> release-changelog.md
            fi
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>📝 Changelog Preview</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat release-changelog.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload changelog artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-changelog
          path: release-changelog.md
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Version Bump: Apply changesets and update package versions
  # ---------------------------------------------------------------------------
  version-bump:
    name: Version Bump
    needs: prepare
    if: needs.prepare.outputs.is_dry_run != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      pr_number: ${{ steps.pr.outputs.pr_number }}
      pr_url: ${{ steps.pr.outputs.pr_url }}
      branch: ${{ steps.branch.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create release branch
        id: branch
        run: |
          BRANCH="release/${{ needs.prepare.outputs.next_version }}"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"
          git checkout -b "$BRANCH"

      - name: Apply version bump
        run: |
          NEXT="${{ needs.prepare.outputs.next_version }}"

          # Update root package.json
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = '$NEXT';
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Apply changesets if available
          if [ "${{ needs.prepare.outputs.has_changesets }}" = "true" ]; then
            npx changeset version 2>/dev/null || true
          fi

      - name: Download changelog
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-changelog

      - name: Update CHANGELOG.md
        run: |
          if [ -f CHANGELOG.md ]; then
            # Prepend new changelog to existing
            mv CHANGELOG.md CHANGELOG.old.md
            cat release-changelog.md > CHANGELOG.md
            echo "" >> CHANGELOG.md
            cat CHANGELOG.old.md >> CHANGELOG.md
            rm CHANGELOG.old.md
          else
            cp release-changelog.md CHANGELOG.md
          fi

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): v${{ needs.prepare.outputs.next_version }}

          - Version bump to ${{ needs.prepare.outputs.next_version }}
          - Updated changelog
          - Applied changesets

          Release-Type: ${{ github.event.inputs.release_type || 'patch' }}
          Triggered-By: @${{ github.actor }}"

      - name: Push release branch
        run: |
          git push origin "${{ steps.branch.outputs.name }}"

      - name: Create release notes PR
        id: pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(cat << 'PRBODY'
          ## 🚂 Release v${{ needs.prepare.outputs.next_version }}

          This PR was automatically created by the Release Train workflow.

          ### Changes
          - Version bumped from `${{ needs.prepare.outputs.current_version }}` to `${{ needs.prepare.outputs.next_version }}`
          - Changelog generated from conventional commits
          - Changesets applied (${{ needs.prepare.outputs.has_changesets && 'yes' || 'none pending' }})

          ### After Merge
          A tag `${{ needs.prepare.outputs.tag }}` will be created, which triggers:
          1. GitHub Release creation (via `release.yml`)
          2. Platform artifact builds (via `release-artifacts.yml`)

          ### Checklist
          - [ ] Review changelog for accuracy
          - [ ] Verify version numbers are correct
          - [ ] Ensure CI passes
          - [ ] Get team approval

          ---
          *Triggered by @${{ github.actor }} via Release Train workflow*
          PRBODY
          )

          PR_URL=$(gh pr create \
            --title "chore(release): v${{ needs.prepare.outputs.next_version }}" \
            --body "$BODY" \
            --base main \
            --head "${{ steps.branch.outputs.name }}" \
            --label "release")

          PR_NUMBER=$(echo "$PR_URL" | grep -oP '\d+$')
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

          echo "### ✅ Release PR Created" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**PR:** $PR_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "⚠️ **Human review required** — merge this PR to trigger the release" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Tag & Release: Create tag after PR merge (runs on push to main)
  # ---------------------------------------------------------------------------
  check-release-merge:
    name: Check for Release Merge
    if: github.event_name == 'push' && contains(github.event.head_commit.message, 'chore(release)')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check if this is a release commit
        id: check
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          if echo "$COMMIT_MSG" | grep -qP 'chore\(release\):\s*v[\d.]+'; then
            VERSION=$(echo "$COMMIT_MSG" | grep -oP 'v[\d]+\.[\d]+\.[\d]+[^\s]*' | head -1)
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"
            echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

  create-tag:
    name: Create Release Tag
    needs: check-release-merge
    if: needs.check-release-merge.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          TAG="${{ needs.check-release-merge.outputs.tag }}"
          VERSION="${{ needs.check-release-merge.outputs.version }}"

          # Check if tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::warning::Tag $TAG already exists — skipping creation"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG" -m "Release $VERSION

          Automated release via Release Train workflow.
          Triggered by: @${{ github.actor }}"

          git push origin "$TAG"

          echo "### 🏷️ Tag Created: \`$TAG\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "This tag will trigger:" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ \`release.yml\` — Create GitHub Release" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ \`release-artifacts.yml\` — Build platform binaries" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Smoke Tests: Run pre-release validation on all platforms
  # ---------------------------------------------------------------------------
  smoke-tests:
    name: Pre-Release Smoke Tests
    needs: prepare
    if: >-
      needs.prepare.outputs.is_dry_run != 'true' &&
      github.event.inputs.skip_smoke_tests != 'true' &&
      github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/reusable-smoke-test.yml
    with:
      version: ${{ needs.prepare.outputs.next_version }}
      platforms: 'android,ios,web,windows'
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Store Metadata: Generate store submission artifacts
  # ---------------------------------------------------------------------------
  store-metadata:
    name: Generate Store Metadata
    needs: prepare
    if: >-
      needs.prepare.outputs.is_dry_run != 'true' &&
      github.event.inputs.generate_store_metadata != 'false' &&
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Generate store metadata
        run: |
          node tools/generate-store-metadata.js \
            --version "${{ needs.prepare.outputs.next_version }}"

      - name: Generate enhanced release notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname --list 'v*' | head -1)
          if [ -n "$PREV_TAG" ]; then
            node tools/generate-release-notes.js \
              --from "$PREV_TAG" \
              --to HEAD \
              --include-breaking \
              > release-metadata/${{ needs.prepare.outputs.next_version }}/release-notes.md \
              2>/dev/null || true
          fi

      - name: Upload store metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: store-metadata-${{ needs.prepare.outputs.next_version }}
          path: release-metadata/
          retention-days: 90

      - name: Summary
        run: |
          echo "### 🏪 Store Metadata Generated" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Version: \`${{ needs.prepare.outputs.next_version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | Artifacts |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-----------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Android | release-notes.txt, metadata.json |" >> "$GITHUB_STEP_SUMMARY"
          echo "| iOS | release-notes.txt, metadata.json |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Web | changelog.md |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Windows | release-notes.txt, metadata.json |" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Dry Run Summary
  # ---------------------------------------------------------------------------
  dry-run-summary:
    name: Dry Run Summary
    needs: prepare
    if: needs.prepare.outputs.is_dry_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Dry run report
        run: |
          echo "### 🏃 Dry Run Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "This was a **dry run** — no changes were made." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Would have created:**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version bump: \`${{ needs.prepare.outputs.current_version }}\` → \`${{ needs.prepare.outputs.next_version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`${{ needs.prepare.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Release branch: \`release/${{ needs.prepare.outputs.next_version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Release notes PR" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "To execute for real, re-run without the dry run flag." >> "$GITHUB_STEP_SUMMARY"
