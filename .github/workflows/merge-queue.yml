# =============================================================================
# Merge Queue — Conflict Detection & Rebase Notifications
# =============================================================================
#
# Detects when open PRs have merge conflicts after main advances, and posts
# a comment notifying the author to rebase. Runs when PRs are opened/synced
# and on a schedule to catch conflicts from main branch changes.
#
# Does NOT auto-merge or auto-rebase (those are human-gated operations).
# Instead, it provides actionable feedback to PR authors.
#
# Sprint: 3 (DevOps)
# =============================================================================

name: Merge Queue

on:
  # Check PRs when they are opened or updated
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main]

  # Periodic check for PRs that became conflicting after main advanced
  schedule:
    # Every 6 hours on weekdays
    - cron: '0 */6 * * 1-5'

  workflow_dispatch:

concurrency:
  group: merge-queue-${{ github.event.pull_request.number || 'scheduled' }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Conflict Detection: Check all open PRs for merge conflicts
  # ---------------------------------------------------------------------------
  conflict-check:
    name: Conflict Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check for conflicts and notify
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const marker = '<!-- merge-queue-conflict-check -->';

            // Determine which PRs to check
            let prsToCheck = [];

            if (context.eventName === 'pull_request_target') {
              // Single PR event — check just this PR
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
              });
              prsToCheck = [pr];
            } else {
              // Scheduled/manual — check all open PRs
              const { data: allPRs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                base: 'main',
                per_page: 100,
                sort: 'updated',
                direction: 'desc',
              });
              prsToCheck = allPRs;
            }

            let conflicting = [];
            let clean = [];

            for (const pr of prsToCheck) {
              // Re-fetch to get latest mergeable state
              const { data: freshPR } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              });

              if (freshPR.mergeable_state === 'dirty' || freshPR.mergeable === false) {
                conflicting.push(freshPR);

                // Post or update conflict notification comment
                const { data: comments } = await github.rest.issues.listComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: freshPR.number,
                });

                const existingComment = comments.find(c => c.body?.includes(marker));

                const body = [
                  marker,
                  `## ⚠️ Merge Conflict Detected`,
                  ``,
                  `This PR has merge conflicts with \`main\` and cannot be merged until they are resolved.`,
                  ``,
                  `### How to fix`,
                  `\`\`\`bash`,
                  `git fetch origin main`,
                  `git checkout ${freshPR.head.ref}`,
                  `git rebase origin/main`,
                  `# Resolve any conflicts, then:`,
                  `git push --force-with-lease origin ${freshPR.head.ref}`,
                  `\`\`\``,
                  ``,
                  `Or use the agent rebase script:`,
                  `\`\`\`bash`,
                  `npm run agent:rebase -- --branch ${freshPR.head.ref}`,
                  `\`\`\``,
                  ``,
                  `*Last checked: ${new Date().toISOString()}*`,
                ].join('\n');

                if (existingComment) {
                  await github.rest.issues.updateComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: existingComment.id,
                    body,
                  });
                } else {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: freshPR.number,
                    body,
                  });
                }
              } else if (freshPR.mergeable === true) {
                clean.push(freshPR);

                // Remove stale conflict comment if PR is now clean
                const { data: comments } = await github.rest.issues.listComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: freshPR.number,
                });

                const existingComment = comments.find(c => c.body?.includes(marker));
                if (existingComment) {
                  const resolvedBody = [
                    marker,
                    `## ✅ Merge Conflict Resolved`,
                    ``,
                    `This PR is now clean and can be merged.`,
                    ``,
                    `*Resolved: ${new Date().toISOString()}*`,
                  ].join('\n');

                  await github.rest.issues.updateComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: existingComment.id,
                    body: resolvedBody,
                  });
                }
              }
            }

            // Summary
            let summary = `## 🔀 Merge Queue Report\n\n`;
            summary += `**Checked:** ${prsToCheck.length} PR(s)\n`;
            summary += `**Clean:** ${clean.length} | **Conflicting:** ${conflicting.length}\n\n`;

            if (conflicting.length > 0) {
              summary += `### ⚠️ PRs with Conflicts\n\n`;
              summary += `| PR | Title | Author | Conflict |\n`;
              summary += `|----|-------|--------|----------|\n`;
              for (const pr of conflicting) {
                summary += `| #${pr.number} | ${pr.title.slice(0, 60)} | @${pr.user.login} | ❌ |\n`;
              }
              summary += `\n`;
            }

            if (clean.length > 0 && context.eventName !== 'pull_request_target') {
              summary += `### ✅ Clean PRs (ready for review)\n\n`;
              summary += `| PR | Title | Author |\n`;
              summary += `|----|-------|--------|\n`;
              for (const pr of clean.slice(0, 20)) {
                summary += `| #${pr.number} | ${pr.title.slice(0, 60)} | @${pr.user.login} |\n`;
              }
            }

            core.summary.addRaw(summary);
            await core.summary.write();

            if (conflicting.length > 0) {
              core.warning(`${conflicting.length} PR(s) have merge conflicts`);
            }
