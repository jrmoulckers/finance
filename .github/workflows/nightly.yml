# =============================================================================
# Nightly Validation — full web E2E, load testing, and penetration testing
# =============================================================================
#
# Combines the scheduled and post-staging validation suites that do not need to run as standalone workflows during normal daytime CI.
# =============================================================================
name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_run:
    workflows: ['Deploy — Staging']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      suites:
        description: 'Which nightly suites to run'
        required: false
        type: choice
        default: all
        options:
          - all
          - e2e
          - load
          - pen
      target_url:
        description: 'Target URL for load tests'
        required: false
        type: string
        default: ''
      vus:
        description: 'Number of virtual users for load tests'
        required: false
        type: number
        default: 50
      duration:
        description: 'Load-test duration (e.g. 2m, 5m, 10m)'
        required: false
        type: string
        default: '2m'
      scenario:
        description: 'Load-test scenario'
        required: false
        type: choice
        default: all
        options:
          - all
          - sync
          - auth
          - api
          - stress
  push:
    branches: [main]
    paths:
      - 'services/**'

concurrency:
  group: nightly-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  security-events: write

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  K6_VERSION: '0.54.0'

jobs:
  web-build:
    name: Nightly Web Build
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (inputs.suites == 'all' || inputs.suites == 'e2e'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/design-tokens
      - name: Build web app
        env:
          VITE_SUPABASE_URL: https://e2e-test.supabase.co
          VITE_SUPABASE_ANON_KEY: e2e-test-anon-key
        run: npm run build -w apps/web
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-web-build
          path: |
            apps/web/dist/
            packages/design-tokens/build/

  web-e2e-tests:
    name: Nightly E2E (${{ matrix.browser }})
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (inputs.suites == 'all' || inputs.suites == 'e2e'))
    needs: web-build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, webkit, firefox, chromium-edge, mobile-chrome, mobile-safari]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nightly-web-build
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/web/package.json') }}
          restore-keys: ${{ runner.os }}-playwright-
      - name: Install Playwright browser
        run: |
          case "${{ matrix.browser }}" in
            chromium|mobile-chrome)
              npx -w apps/web playwright install --with-deps chromium
              ;;
            webkit|mobile-safari)
              npx -w apps/web playwright install --with-deps webkit
              ;;
            firefox)
              npx -w apps/web playwright install --with-deps firefox
              ;;
            chromium-edge)
              npx -w apps/web playwright install --with-deps msedge
              ;;
          esac
      - name: Run E2E tests
        run: |
          if [[ "${{ matrix.browser }}" == mobile-* ]]; then
            npx -w apps/web playwright test e2e/auth.spec.ts -g "login page renders" --project=${{ matrix.browser }}
          else
            npx -w apps/web playwright test --project=${{ matrix.browser }}
          fi
      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-e2e-blob-${{ matrix.browser }}
          path: apps/web/blob-report/
          retention-days: 7
          if-no-files-found: ignore

  web-e2e-report:
    name: Merge Nightly E2E Reports
    if: ${{ !cancelled() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (inputs.suites == 'all' || inputs.suites == 'e2e'))) }}
    needs: web-e2e-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: nightly-e2e-blob-*
          merge-multiple: true
          path: all-blob-reports
      - name: Merge reports
        run: |
          npx -w apps/web playwright merge-reports --reporter=html "${{ github.workspace }}/all-blob-reports" || echo "::warning::No blob reports found to merge"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-e2e-html-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: warn

  load-test:
    name: k6 Load Tests (${{ github.event.inputs.scenario || 'all' }})
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (inputs.suites == 'all' || inputs.suites == 'load'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install k6
        run: |
          curl -fsSL "https://github.com/grafana/k6/releases/download/v${K6_VERSION}/k6-v${K6_VERSION}-linux-amd64.tar.gz" | tar xz --strip-components=1
          sudo mv k6 /usr/local/bin/k6
      - name: Resolve target URL
        id: target
        run: |
          URL="${{ github.event.inputs.target_url || secrets.STAGING_URL || '' }}"
          if [ -z "$URL" ]; then
            echo "url=http://localhost:3000" >> "$GITHUB_OUTPUT"
            echo "has_real_target=false" >> "$GITHUB_OUTPUT"
          else
            echo "url=$URL" >> "$GITHUB_OUTPUT"
            echo "has_real_target=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create k6 scripts
        run: |
          mkdir -p tools/load-tests
          cat > tools/load-tests/api.js <<'SCRIPT'
          import http from 'k6/http';
          import { check, sleep } from 'k6';
          const BASE_URL = '${{ steps.target.outputs.url }}';
          export const options = { vus: Number('${{ github.event.inputs.vus || '50' }}'), duration: '${{ github.event.inputs.duration || '2m' }}' };
          export default function () {
            const res = http.get(`${BASE_URL}/api/health`);
            check(res, { 'health ok': (r) => r.status < 500 });
            sleep(1);
          }
          SCRIPT
      - name: Run k6 load tests
        id: k6
        run: |
          mkdir -p load-test-results
          if k6 run --summary-export=load-test-results/summary.json tools/load-tests/api.js; then
            echo "overall_status=pass" >> "$GITHUB_OUTPUT"
          else
            echo "overall_status=fail" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: load-test-results
          path: load-test-results/
          retention-days: 30
          if-no-files-found: warn
      - name: Performance gate
        if: steps.k6.outputs.overall_status == 'fail'
        continue-on-error: ${{ steps.target.outputs.has_real_target != 'true' }}
        run: exit 1

  zap-baseline:
    name: OWASP ZAP Baseline Scan
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (inputs.suites == 'all' || inputs.suites == 'pen'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Start Supabase stack
        working-directory: services/api
        run: docker compose up -d --wait
      - name: Wait for services to be ready
        run: |
          timeout 120 bash -c 'until curl -s -o /dev/null http://localhost:54321/; do sleep 2; done'
          timeout 120 bash -c 'until curl -s -o /dev/null http://localhost:9000/; do sleep 2; done'
      - name: ZAP Baseline Scan - PostgREST API
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: 'http://localhost:54321'
          fail_action: true
          allow_issue_writing: false
          artifact_name: zap-report-postgrest
          cmd_options: '-I'
      - name: ZAP Baseline Scan - Edge Functions
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: 'http://localhost:9000'
          fail_action: true
          allow_issue_writing: false
          artifact_name: zap-report-edge-functions
          cmd_options: '-I'
      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zap-pen-test-reports
          path: |
            **/report_html.html
            **/report_md.md
            **/report_json.json
          if-no-files-found: ignore
          retention-days: 30
      - name: Tear down Supabase stack
        if: always()
        working-directory: services/api
        run: docker compose down -v
