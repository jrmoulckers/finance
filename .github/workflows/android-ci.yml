name: Android CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/android/**'
      - 'packages/**'
      - 'build-logic/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
  pull_request:
    branches: [main]
    paths:
      - 'apps/android/**'
      - 'packages/**'
      - 'build-logic/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

env:
  GRADLE_OPTS: >-
    -Xmx2g
    -XX:MaxMetaspaceSize=512m
    -Dorg.gradle.daemon=false

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build debug APK
        run: ./gradlew :apps:android:assembleDebug --no-daemon --parallel --build-cache --stacktrace

      - name: Run unit tests
        run: ./gradlew :apps:android:testDebugUnitTest --no-daemon --parallel --build-cache --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk
          path: apps/android/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: |
            apps/android/build/reports/tests/
            apps/android/build/test-results/
          if-no-files-found: warn
          retention-days: 14

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Android Test Results
          path: 'apps/android/build/test-results/**/TEST-*.xml'
          reporter: java-junit
          fail-on-error: true
