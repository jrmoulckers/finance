name: Android CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/android/**'
      - 'packages/**'
      - 'build-logic/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
  pull_request:
    branches: [main]
    paths:
      - 'apps/android/**'
      - 'packages/**'
      - 'build-logic/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  GRADLE_OPTS: >-
    -Xmx2g
    -XX:MaxMetaspaceSize=512m
    -Dorg.gradle.daemon=false

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Compile debug Kotlin
        run: |
          ./gradlew :apps:android:compileDebugKotlin \
            --parallel --build-cache --stacktrace

      - name: Run unit tests
        run: |
          ./gradlew :apps:android:testDebugUnitTest \
            --parallel --build-cache --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: android-test-results
          path: |
            apps/android/build/reports/tests/
            apps/android/build/test-results/
          if-no-files-found: warn
          retention-days: 14

      - name: Publish test results
        if: always() && hashFiles('apps/android/build/test-results/**/TEST-*.xml') != ''
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: Android Test Results
          path: 'apps/android/build/test-results/**/TEST-*.xml'
          reporter: java-junit
          fail-on-error: true

      - name: Assemble debug APK
        run: |
          ./gradlew :apps:android:assembleDebug \
            --parallel --build-cache --stacktrace

      - name: Assemble Android test APK
        run: |
          ./gradlew :apps:android:assembleDebugAndroidTest \
            --parallel --build-cache --stacktrace

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: android-debug-apk
          path: apps/android/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7

  instrumented-tests:
    name: Instrumented Tests (E2E)
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 45

    strategy:
      matrix:
        api-level: [28, 34]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@a22fb3bb4b2f35c1faa98255fe40bfb26164e46b # v2.34.0
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            ./gradlew :apps:android:connectedDebugAndroidTest \
              -Pandroid.testInstrumentationRunnerArguments.package=com.finance.android.e2e \
              --stacktrace

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: android-e2e-results-api${{ matrix.api-level }}
          path: |
            apps/android/build/reports/androidTests/
            apps/android/build/outputs/androidTest-results/
          if-no-files-found: warn
          retention-days: 14
