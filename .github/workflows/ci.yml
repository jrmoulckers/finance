name: CI — Shared Packages

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'build-logic/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'build-logic/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  GRADLE_OPTS: >-
    -Xmx2g
    -XX:MaxMetaspaceSize=512m
    -Dorg.gradle.daemon=false

jobs:
  lint-and-test:
    name: Lint & Test (KMP)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build shared packages
        run: |
          ./gradlew build \
            -x jsBrowserTest -x allTests \
            -x :apps:android:build -x :apps:android:lint \
            -x :apps:android:compileDebugKotlinAndroid -x :apps:android:compileReleaseKotlinAndroid \
            -x :packages:core:compileDebugKotlinAndroid -x :packages:core:compileReleaseKotlinAndroid \
            -x :packages:models:compileDebugKotlinAndroid -x :packages:models:compileReleaseKotlinAndroid \
            -x :packages:sync:compileDebugKotlinAndroid -x :packages:sync:compileReleaseKotlinAndroid \
            -x :packages:core:preBuild -x :packages:models:preBuild -x :packages:sync:preBuild \
            --parallel --build-cache --stacktrace

      - name: Run JVM tests
        run: ./gradlew jvmTest --parallel --build-cache --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: warn
          retention-days: 14

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: KMP Test Results
          path: '**/build/test-results/**/TEST-*.xml'
          reporter: java-junit
          fail-on-error: true
