name: Release — Windows

on:
  push:
    tags:
      - 'v*-windows'
      - 'v*' # Also trigger on global release tags
  workflow_dispatch:
    inputs:
      build-type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
      channel:
        description: 'Distribution channel'
        required: true
        default: 'sideload'
        type: choice
        options:
          - sideload
          - store
      dry-run:
        description: 'Dry run (skip Store submission)'
        required: false
        default: true
        type: boolean

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false # Never cancel release builds — every tag is a distinct artifact.

permissions:
  contents: write
  actions: read

env:
  HAS_SIGNING_SECRETS: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 != '' && secrets.WINDOWS_CERT_PASSWORD != '' }}

jobs:
  # ── Gate: require approval for store releases ───────────────────
  approve:
    name: Approval Gate
    runs-on: ubuntu-latest
    environment: ${{ inputs.channel == 'store' && 'production' || 'staging' }}
    steps:
      - run: echo "✅ Release approved for channel=${{ inputs.channel || 'sideload' }}"

  # ── Build & Sign ────────────────────────────────────────────────
  build:
    name: Build, Sign & Package
    needs: approve
    runs-on: windows-latest
    timeout-minutes: 45
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: true

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Extract version info
        id: version
        shell: bash
        run: |
          # Tag pushes -> strip refs/tags/ and any -windows suffix.
          # workflow_dispatch from a branch -> fall back to branch-name + short SHA so
          # downstream steps never see "refs/heads/main" as the version string.
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION=$(echo "$TAG" | sed -E 's/^v//;s/-windows$//')
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            SHA="${GITHUB_SHA::7}"
            VERSION="${BRANCH}-${SHA}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "📦 Version: ${VERSION}"

      - name: Build application
        run: ./gradlew :apps:windows:build --parallel --build-cache --stacktrace

      - name: Run tests
        run: ./gradlew :apps:windows:test --parallel --build-cache --stacktrace
        # Tests now gate the release. Previously continue-on-error swallowed failures.

      - name: Package MSI
        run: ./gradlew :apps:windows:packageMsi --parallel --build-cache --stacktrace

      - name: Package distributable
        run: ./gradlew :apps:windows:createDistributable --parallel --build-cache --stacktrace
        continue-on-error: true

      - name: Sign MSI
        if: env.HAS_SIGNING_SECRETS == 'true'
        shell: pwsh
        run: |
          # Locate signtool from the Windows SDK — GitHub-hosted windows-latest
          # runners do NOT have signtool.exe on PATH, even though the SDK is
          # installed. Mirrors tools/windows/build-local.ps1's Find-SignTool.
          $sdkRoot = 'C:\Program Files (x86)\Windows Kits\10\bin'
          $signtool = $null
          if (Test-Path $sdkRoot) {
              $signtool = Get-ChildItem -Path $sdkRoot -Directory |
                  Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } |
                  Sort-Object -Property { [version]$_.Name } -Descending |
                  ForEach-Object { Join-Path $_.FullName 'x64\signtool.exe' } |
                  Where-Object { Test-Path $_ } |
                  Select-Object -First 1
          }
          if (-not $signtool) { throw "signtool.exe not found under $sdkRoot" }
          Write-Host "Using signtool: $signtool"

          # Decode signing certificate from secret
          $certBytes = [System.Convert]::FromBase64String("${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}")
          $certPath = Join-Path $env:RUNNER_TEMP "signing-cert.pfx"
          [System.IO.File]::WriteAllBytes($certPath, $certBytes)
          try {
              # Sign exactly the MSI(s) jpackage produced — narrowed from the prior
              # recursive search over apps/windows/build to avoid catching stale or
              # incidental MSI files left behind by earlier builds.
              $msiFiles = Get-ChildItem -Path "apps/windows/build/compose/binaries/main/msi" -Filter "*.msi"
              if (-not $msiFiles) { throw "No MSI found in expected output dir." }
              foreach ($file in $msiFiles) {
                  Write-Host "Signing: $($file.FullName)"
                  & $signtool sign /f $certPath /p "${{ secrets.WINDOWS_CERT_PASSWORD }}" `
                      /fd sha256 /tr http://timestamp.digicert.com /td sha256 $file.FullName
                  if ($LASTEXITCODE -ne 0) { throw "signtool exit $LASTEXITCODE on $($file.FullName)" }
              }
          } finally {
              Remove-Item $certPath -Force -ErrorAction SilentlyContinue
          }

      - name: Warn if signing skipped
        if: env.HAS_SIGNING_SECRETS != 'true'
        run: |
          echo "::warning::WINDOWS_SIGNING_CERT_BASE64 or WINDOWS_CERT_PASSWORD secret is empty — release MSI published unsigned."

      - name: Upload MSI artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-release-msi
          path: apps/windows/build/compose/binaries/main/msi/*.msi
          if-no-files-found: error
          retention-days: 30

      - name: Upload distributable
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-release-distributable
          path: apps/windows/build/compose/binaries/main/app/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-release-test-results
          path: |
            apps/windows/build/reports/tests/
            apps/windows/build/test-results/
          if-no-files-found: warn
          retention-days: 14

  # ── Release Notes ───────────────────────────────────────────────
  release-notes:
    name: Generate Release Notes
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: windows-release-*
          path: release-artifacts/

      - name: Generate release notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "$TAG" | head -1)

          echo "## 🪟 Windows Release — ${TAG}" > release-notes.md
          echo "" >> release-notes.md
          echo "**Version:** ${{ needs.build.outputs.version }}" >> release-notes.md
          echo "" >> release-notes.md

          if [ -n "$PREV_TAG" ]; then
            echo "### Changes since ${PREV_TAG}" >> release-notes.md
            git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${TAG}" -- apps/windows/ packages/ >> release-notes.md
          else
            echo "### Initial release" >> release-notes.md
            git log --pretty=format:"- %s (%h)" "${TAG}" -- apps/windows/ packages/ >> release-notes.md
          fi

          echo "" >> release-notes.md
          echo "### Artifacts" >> release-notes.md
          echo "- MSI installer (signed when secrets are configured)" >> release-notes.md
          echo "- Standalone distributable" >> release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body_path: release-notes.md
          files: release-artifacts/**/*
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          name: 'Windows ${{ needs.build.outputs.version }}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
