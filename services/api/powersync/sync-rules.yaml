bucket_definitions:
  by_household:
    parameters:
      - SELECT household_id FROM household_members WHERE user_id = token_parameters.user_id
    data:
      - SELECT * FROM accounts WHERE household_id = bucket.household_id
      - SELECT * FROM transactions WHERE household_id = bucket.household_id
      - SELECT * FROM categories WHERE household_id = bucket.household_id
      - SELECT * FROM budgets WHERE household_id = bucket.household_id
      - SELECT * FROM goals WHERE household_id = bucket.household_id
  user_profile:
    parameters:
      - SELECT id AS user_id FROM users WHERE id = token_parameters.user_id
    data:
      - SELECT * FROM users WHERE id = bucket.user_id
      - SELECT * FROM household_members WHERE user_id = bucket.user_id
