# =============================================================================
# PowerSync Sync Rules — Finance App
# =============================================================================
#
# Security Model
# --------------
# 1. Tenant isolation: All household data is scoped via the `by_household`
#    bucket. A user only receives data for households where they are an active
#    member (household_members row exists with matching user_id and no
#    deleted_at). This mirrors the RLS policies on the Supabase side.
#
# 2. User-scoped data: Personal profile and credential metadata sync through
#    the `user_profile` bucket, parameterised on the authenticated user's ID
#    from the JWT (token_parameters.user_id).
#
# 3. Soft-delete filtering: Every query includes `deleted_at IS NULL` so that
#    soft-deleted rows are never replicated to clients. Server-side cleanup
#    jobs may hard-delete these rows later without affecting active clients.
#
# 4. Column allowlisting: We enumerate columns explicitly rather than using
#    `SELECT *`. This prevents internal-only columns (`sync_version`,
#    `is_synced`) from leaking to clients and ensures sensitive fields
#    (e.g. `public_key` on passkey_credentials) are never transmitted.
#
# 5. Monetary values: All `_cents` columns are BIGINT (integer cents) with an
#    accompanying `currency_code` (ISO 4217). Clients must never interpret
#    these as floating-point values.
# =============================================================================

bucket_definitions:
  # ---------------------------------------------------------------------------
  # by_household — all data scoped to the households the user belongs to.
  # A separate bucket instance is created per household_id, so a user in
  # multiple households receives one bucket per household.
  # ---------------------------------------------------------------------------
  by_household:
    parameters:
      - SELECT household_id FROM household_members WHERE user_id = token_parameters.user_id AND deleted_at IS NULL

    data:
      # Household metadata
      - SELECT id, name, created_by, created_at, updated_at, deleted_at FROM households WHERE id = bucket.household_id AND deleted_at IS NULL

      # Financial accounts (checking, savings, credit cards, etc.)
      - >
        SELECT id, household_id, name, type, currency_code, balance_cents,
               is_active, icon, color, sort_order, owner_id,
               created_at, updated_at, deleted_at
        FROM accounts
        WHERE household_id = bucket.household_id AND deleted_at IS NULL

      # Transactions (debits, credits, transfers)
      # CHANGED (#1326): Added `tags` (needed by clients for tag display/filtering).
      # CHANGED (#1326): Removed legacy `recurring_rule` column — `recurring_rule_id`
      #   (the proper FK) is already present and is what clients use.
      - >
        SELECT id, household_id, account_id, category_id, amount_cents,
               currency_code, type, payee, note, date, is_recurring,
               transfer_account_id, status,
               transfer_transaction_id, recurring_rule_id, tags, owner_id,
               created_at, updated_at, deleted_at
        FROM transactions
        WHERE household_id = bucket.household_id AND deleted_at IS NULL

      # Spending / income categories
      # CHANGED (#1326): Added `is_system` (clients need to distinguish
      #   system-provided categories from user-created ones).
      - >
        SELECT id, household_id, name, icon, color, parent_id, is_income,
               is_system, sort_order, owner_id,
               created_at, updated_at, deleted_at
        FROM categories
        WHERE household_id = bucket.household_id AND deleted_at IS NULL

      # Budget allocations per category/period
      # CHANGED (#1326): Added `name` (Budget model has a name field that
      #   clients need for display; was previously missing from allowlist).
      - >
        SELECT id, household_id, category_id, name, amount_cents, currency_code,
               period, start_date, end_date, is_rollover, owner_id,
               created_at, updated_at, deleted_at
        FROM budgets
        WHERE household_id = bucket.household_id AND deleted_at IS NULL

      # Savings goals
      - >
        SELECT id, household_id, name, target_cents, current_cents,
               currency_code, target_date, icon, color,
               account_id, status, owner_id,
               created_at, updated_at, deleted_at
        FROM goals
        WHERE household_id = bucket.household_id AND deleted_at IS NULL

      # Household members - all members of each household the user belongs to.
      # Enables the client to display co-member names, roles, and household
      # member lists. (The user_profile bucket syncs only the user's OWN
      # membership records; this syncs ALL members for the household.)
      - >
        SELECT id, household_id, user_id, role, joined_at,
               created_at, updated_at, deleted_at
        FROM household_members
        WHERE household_id = bucket.household_id AND deleted_at IS NULL

      # Household invitations — lets members see pending/accepted invites.
      # SECURITY: invited_email is deliberately excluded — it is PII that
      # must not be synced to all household members (GDPR). Clients use
      # invitation_status and role to display invite state.
      # SECURITY (#1326): invite_code removed — invite codes allow accepting
      # invitations and must not be broadcast to all household members.
      # Only the inviter (via Edge Function response) and the invitee (via
      # the invitation link) should possess the code.
      - >
        SELECT id, household_id, invited_by,
               role, expires_at, accepted_at, accepted_by,
               created_at, updated_at, deleted_at
        FROM household_invitations
        WHERE household_id = bucket.household_id AND deleted_at IS NULL

      # Recurring transaction templates
      - >
        SELECT id, household_id, account_id, category_id, amount_cents,
               currency_code, type, payee, note, frequency, day_of_month,
               day_of_week, start_date, end_date, last_generated_date,
               next_due_date, is_active, owner_id,
               created_at, updated_at, deleted_at
        FROM recurring_transaction_templates
        WHERE household_id = bucket.household_id AND deleted_at IS NULL

      # Family plan subscriptions
      - >
        SELECT id, household_id, billing_owner_id, owner_id, plan_type,
               status, price_cents, currency_code, billing_cycle,
               max_members, current_members, started_at,
               current_period_end, canceled_at, expires_at,
               created_at, updated_at, deleted_at
        FROM family_plan_subscriptions
        WHERE household_id = bucket.household_id AND deleted_at IS NULL

      # Report configurations
      - >
        SELECT id, household_id, owner_id, name, report_type, config,
               last_generated_at,
               created_at, updated_at, deleted_at
        FROM report_configs
        WHERE household_id = bucket.household_id AND deleted_at IS NULL

      # Detected recurring bills
      - >
        SELECT id, household_id, owner_id, merchant,
               estimated_amount_cents, currency_code, frequency,
               confidence_score, last_transaction_date,
               next_expected_date, transaction_count, avg_amount_cents,
               status, category_id, account_id,
               created_at, updated_at, deleted_at
        FROM detected_bills
        WHERE household_id = bucket.household_id AND deleted_at IS NULL

      # Investment portfolios
      - >
        SELECT id, household_id, owner_id, name, description, currency_code,
               is_active, provider, last_synced_at,
               created_at, updated_at, deleted_at
        FROM investment_portfolios
        WHERE household_id = bucket.household_id AND deleted_at IS NULL

      # Investment holdings
      - >
        SELECT id, portfolio_id, household_id, owner_id, ticker_symbol,
               name, asset_type, quantity_units, quantity_precision,
               cost_basis_cents, currency_code, acquired_date,
               created_at, updated_at, deleted_at
        FROM investment_holdings
        WHERE household_id = bucket.household_id AND deleted_at IS NULL

      # Bill reminders
      - >
        SELECT id, household_id, owner_id, detected_bill_id, merchant,
               amount_cents, currency_code, frequency, next_due_date,
               is_auto_pay, is_active, reminder_days, account_id,
               category_id, note,
               created_at, updated_at, deleted_at
        FROM bill_reminders
        WHERE household_id = bucket.household_id AND deleted_at IS NULL

      # Report templates
      - >
        SELECT id, household_id, owner_id, name, description,
               report_type, template_config, is_default, usage_count,
               last_used_at,
               created_at, updated_at, deleted_at
        FROM report_templates
        WHERE household_id = bucket.household_id AND deleted_at IS NULL

      # Import job status (for progress tracking)
      # CHANGED (#1575): Added source_type, duplicate_strategy for provenance tracking
      - >
        SELECT id, household_id, owner_id, account_id, file_name,
               format, status, total_rows, imported_rows,
               duplicate_rows, error_rows, source_type,
               duplicate_strategy, started_at, completed_at,
               created_at, updated_at, deleted_at
        FROM import_jobs
        WHERE household_id = bucket.household_id AND deleted_at IS NULL

      # Bank connection health status (#1577)
      # SECURITY: error_detail may reference provider error codes — no PII.
      - >
        SELECT id, bank_connection_id, household_id,
               status, error_category, error_detail,
               last_successful_sync, staleness_minutes,
               resolved_at, resolution_action, created_at
        FROM bank_connection_health
        WHERE household_id = bucket.household_id

      # Connector permissions — third-party access control (#1583)
      # SECURITY: token_status synced for display; no token values.
      - >
        SELECT id, bank_connection_id, household_id, owner_id,
               permission_level, granted_scopes, scope_descriptions,
               is_revoked, revoked_at, token_status, token_expires_at,
               created_at, updated_at, deleted_at
        FROM connector_permissions
        WHERE household_id = bucket.household_id AND deleted_at IS NULL

      # Connector access audit log (#1583)
      # Read-only on clients. NEVER contains raw financial data.
      - >
        SELECT id, bank_connection_id, household_id,
               access_type, provider_name, status,
               record_count, duration_ms, created_at
        FROM connector_access_log
        WHERE household_id = bucket.household_id

      # Open banking connections (#1586)
      # SECURITY: encrypted_refresh_token deliberately excluded.
      - >
        SELECT id, bank_connection_id, household_id, owner_id,
               consent_id, consent_status, consent_expires_at,
               regulation, created_at, updated_at, deleted_at
        FROM open_banking_connections
        WHERE household_id = bucket.household_id AND deleted_at IS NULL

  # ---------------------------------------------------------------------------
  # user_profile — per-user data that is NOT household-scoped.
  # Contains the user's own profile and their passkey credential metadata
  # (public_key is intentionally excluded — it must never leave the server).
  # ---------------------------------------------------------------------------
  user_profile:
    parameters:
      - SELECT id AS user_id FROM users WHERE id = token_parameters.user_id AND deleted_at IS NULL

    data:
      # User profile
      - >
        SELECT id, email, display_name, avatar_url, currency_code,
               created_at, updated_at, deleted_at
        FROM users
        WHERE id = bucket.user_id AND deleted_at IS NULL

      # Household membership records for the authenticated user
      - >
        SELECT id, household_id, user_id, role, joined_at,
               created_at, updated_at, deleted_at
        FROM household_members
        WHERE user_id = bucket.user_id AND deleted_at IS NULL

      # Passkey credential metadata (for passkey management UI).
      # SECURITY: public_key is deliberately excluded — clients only need
      # device_type, transports, and timestamps to display credential info.
      # SECURITY (#1326): counter removed — the WebAuthn signature counter
      # is server-side clone-detection metadata. Leaking it to clients
      # provides no UI value and exposes security internals.
      - >
        SELECT id, user_id, credential_id, device_type, backed_up,
               transports,
               created_at, updated_at, deleted_at
        FROM passkey_credentials
        WHERE user_id = bucket.user_id AND deleted_at IS NULL

      # Referrals — user's own referrals (as referrer or referee)
      - >
        SELECT id, referrer_id, referee_id, referral_code, status,
               reward_type, accepted_at, expires_at,
               created_at, updated_at, deleted_at
        FROM referrals
        WHERE (referrer_id = bucket.user_id OR referee_id = bucket.user_id)
              AND deleted_at IS NULL

      # User consent records (GDPR). Synced for local consent state display.
      # SECURITY: ip_address/user_agent excluded — PII for server audit only.
      - >
        SELECT id, user_id, consent_type, status, policy_version, created_at
        FROM user_consents
        WHERE user_id = bucket.user_id

  # ---------------------------------------------------------------------------
  # exchange_rates — global exchange rate data synced to all authenticated users.
  # A single bucket instance shared across all users. Rates are read-only
  # on clients (only the server can insert/update via service_role).
  # ---------------------------------------------------------------------------
  exchange_rates:
    # Global bucket (no parameters) — syncs to all authenticated clients.
    # Exchange rate data is shared/read-only; authentication is enforced at
    # the JWT level by PowerSync (only authenticated users get any sync data).
    data:
      # Exchange rates (global, read-only on clients)
      - >
        SELECT id, base_currency, target_currency, rate_multiplied,
               rate_precision, source, valid_date,
               created_at, updated_at, deleted_at
        FROM exchange_rates
        WHERE deleted_at IS NULL

      # Price history (global, read-only on clients)
      - >
        SELECT id, ticker_symbol, close_price_cents, currency_code,
               price_date, source,
               created_at, updated_at, deleted_at
        FROM price_history
        WHERE deleted_at IS NULL

      # Aggregator provider registry (global, read-only on clients) (#1575)
      # Reference data for provider selection and health display.
      - >
        SELECT id, name, display_name, provider_type, status,
               health_score, priority, is_enabled, supported_regions,
               capabilities, last_health_check, incident_count,
               created_at, updated_at, deleted_at
        FROM aggregator_providers
        WHERE deleted_at IS NULL AND is_enabled = true
