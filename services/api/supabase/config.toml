# Supabase CLI project configuration
# See: https://supabase.com/docs/guides/cli/config

project_id = "finance-local"

[api]
enabled = true
port = 54321
schemas = ["public", "auth", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://localhost"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# ---------------------------------------------------------------------------
# Edge Functions (#1886) — cookie-bearing auth proxy
#
# `verify_jwt = false` because these functions enforce their own auth via
# the HttpOnly `finance_refresh` cookie (or accept anonymous traffic for
# login/signup/OAuth start). Letting Kong validate a JWT would reject
# requests that legitimately have no Authorization header.
# ---------------------------------------------------------------------------

[functions.auth-login]
verify_jwt = false

[functions.auth-signup]
verify_jwt = false

[functions.auth-refresh]
verify_jwt = false

[functions.auth-logout]
verify_jwt = false

[functions.auth-oauth-start]
verify_jwt = false

[functions.auth-oauth-callback]
verify_jwt = false

[functions.feedback]
verify_jwt = false
